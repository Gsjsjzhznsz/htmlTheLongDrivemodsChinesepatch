<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLD Mod Installer</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='tld.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* 修复布局填充：确保 main-content 自动扩展 */
        body { display: flex; min-height: 100vh; margin: 0; }
        .main-content { 
            flex: 1; 
            height: 100vh; 
            overflow-y: auto; 
            padding: 20px; 
            box-sizing: border-box;
            background: var(--bg-color);
            transition: margin-left 0.3s; /* 平滑过渡 */
        }

        /* Toast 悬浮优化 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999; /* 最高层级 */
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none; /* 不阻挡下层点击 */
        }
        .toast {
            background: rgba(30, 30, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #444;
            border-left: 4px solid #4caf50;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            color: #fff;
            min-width: 250px;
            max-width: 350px;
            font-size: 14px;
            pointer-events: auto;
            animation: slideInRight 0.3s ease-out forwards;
        }
        .toast.error { border-left-color: #f44336; }
        .toast.warning { border-left-color: #ff9800; background: rgba(255, 152, 0, 0.1); }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* 统一按钮圆角 */
        button, .action-btn, .sidebar-btn, .view-btn, .mod-actions button {
            border-radius: 6px !important; /* 统一微圆角 */
        }
        
        /* 批量操作栏样式 */
        .batch-bar {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 42, 0.95);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            gap: 15px;
            z-index: 1100;
            border: 1px solid #4caf50;
        }
        .batch-bar.active { display: flex; }

        /* 多选框优化 */
        .multi-check {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 20;
            width: 20px;
            height: 20px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            accent-color: #4caf50;
        }
        .mod-card-wrapper:hover .multi-check { opacity: 0.8; }
        .multi-check:checked { opacity: 1; }

        /* 下载任务详情优化 */
        .task-item { margin-bottom: 8px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; }
        .task-name { font-size: 12px; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-stats { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-top: 2px; }
    </style>
</head>
<body>
    <!-- 左侧导航栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo-icon">🚗</span>
            <span class="logo-text" data-i18n="app_title">TLD Manager</span>
        </div>
        
        <div class="sidebar-actions">
            <button class="sidebar-btn primary" onclick="launchSteam()">🎮 <span data-i18n="launch_game">启动游戏</span></button>
            <button class="sidebar-btn primary" onclick="launchExe()">🚀 <span data-i18n="launch_exe">启动 EXE</span></button>
            <button class="sidebar-btn secondary" onclick="installPatcher()">🔧 <span data-i18n="install_patcher">安装加载器</span></button>
            <button class="sidebar-btn secondary" onclick="download1000Cheat()">📏 <span data-i18n="cheat_1000km">改1000公里</span></button>
        </div>

        <ul class="nav-list">
            <li class="nav-item active" data-tab="browse"><svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg><span class="menu-text" data-i18n="browse_mods">浏览模组</span></li>
            <li class="nav-item" data-tab="modpacks"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm0 14H4V4h16v12z"/></svg><span class="menu-text" data-i18n="modpacks">模组包</span></li>
            <li class="nav-item" data-tab="manage"><svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg><span class="menu-text" data-i18n="installed_mods">已安装</span></li>
            <li class="nav-item" data-tab="settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg><span class="menu-text" data-i18n="settings">设置</span></li>
            <li class="nav-item" data-tab="about"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span class="menu-text" data-i18n="about">关于</span></li>
        </ul>
        <div class="sidebar-footer">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="container">
            <div id="browse-tab" class="tab-content active">
                <div class="top-bar">
                    <div class="source-selector">
                        <label>📡 <span data-i18n="data_source">源:</span></label>
                        <select id="source-select"></select>
                        <label style="margin-left: 15px; font-size: 0.8rem; color: #aaa;">
                            <input type="checkbox" id="strict-mode" style="width: auto; margin-right: 5px;">
                            <span data-i18n="strict_mode">严格模式</span>
                        </label>
                    </div>
                    <div class="view-toggle">
                        <button id="select-all-btn" class="view-btn" onclick="selectAll()">全选</button>
                        <button id="invert-btn" class="view-btn" onclick="invertSelection()">反选</button>
                        <button id="clear-btn" class="view-btn" onclick="clearSelection()">已选(<span id="selected-count">0</span>)</button>
                        <button id="grid-view-btn" class="view-btn active">卡片</button>
                        <button id="list-view-btn" class="view-btn">列表</button>
                    </div>
                </div>
                <div class="filters">
                    <input type="text" id="search" class="search-input" placeholder="搜索...">
                    <select id="category" class="category-select"><option value="">所有分类</option></select>
                </div>
                <div id="mod-list" class="mod-grid"></div>
            </div>

            <div id="modpacks-tab" class="tab-content">
                <div class="top-bar">
                    <div class="source-selector">
                        <label>📡 <span data-i18n="data_source">源:</span></label>
                        <select id="modpack-source-select"></select>
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn" onclick="exportModpack()">📤 导出</button>
                        <button class="view-btn" onclick="document.getElementById('import-file').click()">📥 导入</button>
                        <input type="file" id="import-file" hidden accept=".txt" onchange="importModpack(this)">
                    </div>
                </div>
                <div id="modpack-list" class="mod-grid"></div>
            </div>

            <div id="manage-tab" class="tab-content">
                <div class="top-bar"><div class="source-selector"><label>📡 <span data-i18n="data_source">源:</span></label><select id="manage-source-select"></select></div></div>
                <div id="installed-list" class="mod-grid"></div>
            </div>

            <div id="settings-tab" class="tab-content">
                <div class="settings-section">
                    <h3>⚙️ <span data-i18n="update_settings">更新与网络</span></h3>
                    <div class="setting-row">
                        <button class="action-btn primary" onclick="checkUpdate(true)">🔄 手动检测更新</button>
                    </div>
                    <div class="setting-row" style="margin-top:10px;">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="gh-proxy-check" checked onchange="saveProxySetting()">
                            <span>🚀 使用 GitHub 加速源 (ghproxy.net)</span>
                        </label>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>🎨 <span data-i18n="ui_theme">界面设置</span></h3>
                    <div class="setting-row">
                        <label data-i18n="bg_color">背景颜色:</label>
                        <input type="color" id="bg-color" value="#12121a">
                    </div>
                    <div class="setting-row">
                        <label data-i18n="text_color">字体颜色:</label>
                        <input type="color" id="text-color" value="#ffffff">
                    </div>
                    <button class="action-btn primary" onclick="applyTheme()" data-i18n="apply_theme">应用主题</button>
                </div>
                
                <div class="settings-section">
                    <h3>🌐 <span data-i18n="language_settings">语言设置</span></h3>
                    <div class="setting-row">
                        <label data-i18n="ui_language">界面语言:</label>
                        <select id="lang-select" onchange="changeLanguage(this.value)">
                            <option value="auto">自动</option>
                            <option value="zh">中文</option>
                            <option value="en">English</option>
                            <!-- 其他语言... -->
                        </select>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>🚀 <span data-i18n="feature_settings">启动设置</span></h3>
                    <div class="setting-row">
                        <label data-i18n="exe_path">游戏 EXE 路径:</label>
                        <input type="text" id="exe-path" placeholder="例如: C:\Games\TLD.exe">
                        <button class="action-btn secondary" onclick="browseExe()" style="margin-left:10px;" data-i18n="browse">浏览</button>
                    </div>
                    <button class="action-btn primary" onclick="saveSettings()" data-i18n="save_settings">保存设置</button>
                </div>
            </div>
            
            <div id="about-tab" class="tab-content">
                 <div class="settings-section">
                    <h3>ℹ️ <span data-i18n="about_title">关于本项目</span></h3>
                    <p style="color:#ccc; line-height:1.6;">TLD Mod Installer 由yiqiu开发。</p>
                    <p style="color:#ccc; line-height:1.6;">联系方式qq群661726941。</p>
                    <p style="color:#4caf50; margin-top:10px;">当前版本: {{ version }}</p>
                </div>
            </div>
        </div>
    </div>

    <div id="download-manager" class="download-manager">
        <div class="download-header" id="download-toggle">
            <span>📥 <span data-i18n="download_tasks">任务</span> (<span id="task-count">0</span>)</span>
        </div>
        <div id="task-list" class="task-list" style="display:none;"></div>
    </div>
    
    <!-- 批量操作工具栏 -->
    <div id="batch-bar" class="batch-bar">
        <span>已选择 <span id="batch-count">0</span> 个模组</span>
        <button class="action-btn primary" onclick="batchInstall()">批量安装</button>
        <button class="action-btn secondary" onclick="clearSelection()">取消</button>
    </div>
    
    <!-- Toast 容器 -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- 其他模态框保持不变 ... -->
    <div id="mod-modal" class="modal">...</div>
    <div id="modpack-result-modal" class="modal">...</div>
    
    <!-- 简化版模态框内容，实际请保留原有的完整内容 -->
    <script>
        // ==================== JS 逻辑 ====================
        let translations = {};
        // ... 初始化代码保持不变 ...
        
        // 翻译函数
        function t(key, def, args){ 
            let txt = translations[key] || def;
            if(args) Object.keys(args).forEach(k=>txt=txt.replace(`{${k}}`, args[k]));
            return txt;
        }

        // ==================== 核心逻辑 ====================
        let allMods = [];
        let selectedMods = new Set();
        
        // ... 其他变量定义 ...

        const showToast = (msg, type='info') => {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(), 300); }, 4000);
        };

        // ==================== 设置页功能 ====================
        async function saveProxySetting() {
            const useProxy = document.getElementById('gh-proxy-check').checked;
            await fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ use_gh_proxy: useProxy })
            });
            showToast(t('toast_settings_saved','设置已保存'), 'success');
        }

        async function loadConfig() {
            const res = await fetch('/api/config');
            const cfg = await res.json();
            if(cfg.exe_path) document.getElementById('exe-path').value = cfg.exe_path;
            if(cfg.use_gh_proxy !== undefined) document.getElementById('gh-proxy-check').checked = cfg.use_gh_proxy;
            // ... 其他加载逻辑
        }

        // ==================== 更新功能 ====================
        async function checkUpdate(manual = false) {
            try {
                const res = await fetch('/api/check-update');
                const data = await res.json();
                if (data.update_available) {
                    const msg = `发现新版本 <b>${data.latest}</b>！<br>
                        <button class="action-btn primary" style="margin-top:10px; padding:5px 10px;" onclick="downloadUpdate('${data.download_url}')">立即下载</button>
                        <a href="${data.url}" target="_blank" style="margin-left:10px; color:#fff">查看详情</a>`;
                    showToast(msg, 'warning'); // 使用 warning 样式突出显示
                } else if (manual) {
                    showToast('当前已是最新版本！', 'success');
                }
            } catch(e) {
                if(manual) showToast('检查更新失败，请检查网络', 'error');
            }
        }

        async function downloadUpdate(url) {
            if(!url) { showToast('未找到下载链接', 'error'); return; }
            showToast('正在后台下载更新包...', 'info');
            const res = await fetch(`/api/download-update?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if(data.success) {
                showToast(`更新包已下载到：<br><b>${data.path}</b><br>请关闭程序后手动替换文件。`, 'success');
            } else {
                showToast(`下载失败: ${data.error}`, 'error');
            }
        }

        // ==================== 源切换逻辑修复 ====================
        // 修改源切换事件，增加清空选择
        document.getElementById('source-select').onchange = (e) => { 
            currentBrowseSource = parseInt(e.target.value); 
            localStorage.setItem('sel_browse', currentBrowseSource); 
            clearSelection(); // 清空多选
            loadMods(currentBrowseSource); 
        };
        
        // ... 其他源切换事件类似 ...

        // ==================== 下载任务显示优化 ====================
        function updateTaskList(tasks) {
            const c = document.getElementById('task-list');
            const active = tasks.filter(t => t.status === 'downloading' || t.status === 'pending');
            if(active.length > 0) {
                c.style.display = 'block';
                c.innerHTML = active.map(t => {
                    const speed = t.speed ? `${(t.speed/1024/1024).toFixed(2)} MB/s` : '';
                    const total = t.total_size ? `${(t.total_size/1024/1024).toFixed(2)} MB` : '';
                    return `
                    <div class="task-item">
                        <div class="task-name">${escapeHtml(t.name)}</div>
                        <div class="task-progress-bar" style="width: ${t.progress}%"></div>
                        <div class="task-stats">
                            <span>${t.progress.toFixed(0)}%</span>
                            <span>${speed} ${total}</span>
                        </div>
                    </div>
                    `;
                }).join('');
            } else { c.style.display = 'none'; }
        }

        // ... 其余逻辑保持不变 ...
        
        // 启动检查更新
        // initLanguage().then(...).then(()=>checkUpdate(false));

    </script>
</body>
