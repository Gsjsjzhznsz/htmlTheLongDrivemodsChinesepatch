<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLD Mod Installer</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='tld.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- 左侧导航栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo-icon">🚗</span>
            <span class="logo-text" data-i18n="app_title">TLD Manager</span>
        </div>
        
        <div class="sidebar-actions">
            <button class="sidebar-btn primary" onclick="launchSteam()" data-i18n="launch_game">🎮 启动游戏</button>
            <button class="sidebar-btn primary" onclick="launchExe()" data-i18n="launch_exe">🚀 启动 EXE</button>
            <button class="sidebar-btn secondary" onclick="installPatcher()" data-i18n="install_patcher">🔧 安装加载器</button>
            <button class="sidebar-btn secondary" onclick="download1000Cheat()" data-i18n="cheat_1000km">📏 改1000公里</button>
        </div>

        <ul class="nav-list">
            <li class="nav-item active" data-tab="browse"><svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg><span class="menu-text" data-i18n="browse_mods">📦 浏览模组</span></li>
            <li class="nav-item" data-tab="modpacks"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm0 14H4V4h16v12z"/></svg><span class="menu-text" data-i18n="modpacks">📚 模组包</span></li>
            <li class="nav-item" data-tab="manage"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg><span class="menu-text" data-i18n="installed_mods">🔧 已安装</span></li>
            <li class="nav-item" data-tab="settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg><span class="menu-text" data-i18n="settings">⚙️ 设置</span></li>
            <li class="nav-item" data-tab="about"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span class="menu-text" data-i18n="about">ℹ️ 关于</span></li>
        </ul>
        <div class="sidebar-footer"><button class="sidebar-toggle" onclick="toggleSidebar()">☰</button></div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="container">
            <div id="browse-tab" class="tab-content active">
                <div class="top-bar">
                    <div class="source-selector">
                        <label data-i18n="data_source">📡 源:</label>
                        <select id="source-select"></select>
                        <label style="margin-left: 15px; font-size: 0.8rem; color: #aaa;">
                            <input type="checkbox" id="strict-mode" style="width: auto; margin-right: 5px;">
                            <span data-i18n="strict_mode">严格模式</span>
                        </label>
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn" onclick="selectAll()">全选</button>
                        <button class="view-btn" onclick="invertSelection()">反选</button>
                        <button class="view-btn" onclick="clearSelection()">已选(<span id="selected-count">0</span>)</button>
                        <button id="grid-view-btn" class="view-btn active">卡片</button>
                        <button id="list-view-btn" class="view-btn">列表</button>
                    </div>
                </div>
                <div class="filters">
                    <input type="text" id="search" class="search-input" placeholder="搜索模组名或作者...">
                    <select id="category" class="category-select"><option value="">所有分类</option></select>
                </div>
                <div id="mod-list" class="mod-grid"></div>
            </div>

            <div id="modpacks-tab" class="tab-content">
                <div class="top-bar">
                    <div class="source-selector">
                        <label data-i18n="data_source">📡 源:</label>
                        <select id="modpack-source-select"></select>
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn" onclick="exportModpack()">📤 导出</button>
                        <button class="view-btn" onclick="document.getElementById('import-file').click()">📥 导入</button>
                        <input type="file" id="import-file" hidden accept=".txt" onchange="importModpack(this)">
                    </div>
                </div>
                <div id="modpack-list" class="mod-grid"></div>
            </div>

            <!-- 已安装页：增加多选按钮 -->
            <div id="manage-tab" class="tab-content">
                <div class="top-bar">
                    <div class="source-selector">
                        <label data-i18n="data_source">📡 源:</label>
                        <select id="manage-source-select"></select>
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn" onclick="selectAllInstalled()">全选</button>
                        <button class="view-btn" onclick="invertSelectionInstalled()">反选</button>
                        <button class="view-btn" onclick="clearSelectionInstalled()">已选(<span id="selected-installed-count">0</span>)</button>
                    </div>
                </div>
                <div id="installed-list" class="mod-grid"></div>
            </div>

            <div id="settings-tab" class="tab-content">
                <div class="settings-section">
                    <h3>🔄 更新设置</h3>
                    <div class="setting-row">
                        <button class="action-btn primary" onclick="manualCheckUpdate()">🔍 手动检查更新</button>
                    </div>
                    <div class="setting-row">
                        <label>启用 GitHub 加速源:</label>
                        <input type="checkbox" id="use-proxy" style="width: auto;">
                        <span style="color:#aaa; font-size:0.8rem;">(推荐国内用户开启)</span>
                    </div>
                    <div class="setting-row">
                        <label>旧版本备份文件名:</label>
                        <input type="text" id="backup-name" placeholder="例如: ModpackManager_old.exe">
                    </div>
                </div>

                <div class="settings-section">
                    <h3>🎨 界面设置</h3>
                    <div class="setting-row">
                        <label>背景颜色:</label>
                        <input type="color" id="bg-color" value="#12121a">
                        <button class="action-btn secondary" onclick="resetTheme()" style="margin-left: 10px;">重置</button>
                    </div>
                    <button class="action-btn primary" onclick="applyTheme()">应用主题</button>
                </div>
                
                <div class="settings-section">
                    <h3>🌐 语言设置</h3>
                    <div class="setting-row">
                        <label>界面语言:</label>
                        <select id="lang-select" onchange="changeLanguage(this.value)">
                            <option value="auto">自动</option>
                            <option value="zh">中文</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>🚀 启动设置</h3>
                    <div class="setting-row">
                        <label>游戏 EXE 路径:</label>
                        <input type="text" id="exe-path" placeholder="例如: C:\Games\TLD.exe">
                        <button class="action-btn secondary" onclick="browseExe()" style="margin-left:10px;">浏览</button>
                    </div>
                    <button class="action-btn primary" onclick="saveSettings()">保存设置</button>
                </div>
            </div>
            
            <div id="about-tab" class="tab-content">
                 <div class="settings-section">
                    <h3>ℹ️ 关于本项目</h3>
                    <p style="color:#ccc; line-height:1.6;">TLD Mod Installer 由yiqiu开发。</p>
                    <p style="color:#ccc; line-height:1.6;">联系方式qq群661726941。</p>
                    <p style="color:#ccc; line-height:1.6;">email: 2308534727@qq.com</p>
                    <p style="color:#4caf50; margin-top:10px;">许可证: AGPL-3.0</p>
                    <p style="color:#888; margin-top:5px;">当前版本: {{ version }}</p>
                </div>
                <div class="settings-section">
                    <h3>📄 许可证详情</h3>
                    <textarea id="license-box" style="width:100%; height:300px; background:#0f0f17; color:#ccc; border:1px solid #2a2a36; padding:10px;" readonly>Loading...</textarea>
                </div>
            </div>
        </div>
    </div>

    <div id="download-manager" class="download-manager">
        <div class="download-header"><span>📥 任务 (<span id="task-count">0</span>)</span></div>
        <div id="task-list" class="task-list" style="display:none;"></div>
    </div>
    
    <!-- 批量操作栏：浏览页 -->
    <div id="batch-bar" class="batch-bar">
        <span>已选择 <span id="batch-count">0</span> 个模组</span>
        <button class="action-btn primary" onclick="batchInstall()">批量安装</button>
        <button class="action-btn secondary" onclick="batchUninstall()">批量卸载</button>
        <button class="action-btn secondary" onclick="clearSelection()">取消</button>
    </div>

    <!-- 批量操作栏：已安装页 -->
    <div id="batch-bar-installed" class="batch-bar">
        <span>已选择 <span id="batch-installed-count">0</span> 个模组</span>
        <button class="action-btn primary" onclick="batchUpdate()">批量更新</button>
        <button class="action-btn secondary" onclick="batchUninstallInstalled()">批量卸载</button>
        <button class="action-btn secondary" onclick="clearSelectionInstalled()">取消</button>
    </div>
    
    <!-- 模态框 -->
    <div id="mod-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-image"><img id="modal-picture" src="" alt="Mod Image"></div>
            <h2 id="modal-title"></h2>
            <p><strong>作者:</strong> <span id="modal-author"></span></p>
            <p><strong>版本:</strong> <span id="modal-version"></span></p>
            <div id="modal-description" class="modal-description"></div>
            <div class="modal-actions">
                <button id="modal-install-btn" class="install">安装</button>
                <button id="modal-uninstall-btn" class="uninstall" style="display:none;">卸载</button>
            </div>
        </div>
    </div>
    
    <div id="modpack-result-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-result">&times;</span>
            <h3>📦 操作结果</h3>
            <div id="modpack-result-list" style="max-height: 400px; overflow-y: auto; margin-top: 12px;"></div>
            <div style="text-align: right; margin-top: 16px;"><button id="close-result-btn" class="install">关闭</button></div>
        </div>
    </div>
    
    <div id="toast-container" class="toast-container"></div>

<script>
    // ==================== 核心逻辑 ====================
    let allMods = [];
    let currentBrowseSource = 0;
    let currentModpackSource = 0;
    let currentManageSource = 0;
    let currentView = 'grid';
    
    // 分开管理两个页面的选中状态
    let selectedMods = new Set(); // 浏览页
    let selectedInstalled = new Set(); // 已安装页

    const showToast = (msg, type='info') => {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = msg; c.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 5000);
    };
    
    const escapeHtml = (s) => s ? s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;") : '';
    const noImageSvg = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIiB2aWV3Qm94PSIwIDAgMjAwIDIwMCI+PHJlY3Qgd2lkdGg9IjIwMCIgaGVpZ2h0PSIyMDAiIGZpbGw9IiMyYTJhMzYiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZG9taW5hbnQtYmFzZWxpbmU9Im1pZGRsZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iIzg4OCIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMjAiPk5vIEltYWdlPC90ZXh0Pjwvc3ZnPg==";

    // ==================== 更新功能 ====================
    async function manualCheckUpdate() {
        showToast('正在检查更新...', 'info');
        const res = await fetch('/api/check-update');
        const data = await res.json();
        if (data.update_available) {
            if (confirm(`发现新版本 ${data.latest}！\n点击确定立即下载并更新。`)) performUpdate(data.download_url);
        } else showToast('当前已是最新版本！', 'success');
    }

    async function performUpdate(url) {
        const backupName = document.getElementById('backup-name').value || 'ModpackManager_old.exe';
        try {
            const res = await fetch('/api/do-update', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url: url, backup_name: backupName })
            });
            const result = await res.json();
            if (result.success) {
                document.querySelector('.sidebar').style.display = 'none';
                document.querySelector('.main-content').innerHTML = `
                    <div style="text-align: center; padding: 50px; color: white;">
                        <h1 style="font-size: 3em; margin-bottom: 20px;">✅ 更新已下载</h1>
                        <p style="font-size: 1.5em; color: #ccc;">请关闭此窗口以完成安装。</p>
                    </div>`;
                setTimeout(() => { window.close(); }, 500);
            } else showToast('更新失败: ' + result.error, 'error');
        } catch(e) { showToast('更新请求失败', 'error'); }
    }

    // ==================== 功能函数 ====================
    function launchSteam() { window.location.href = 'steam://rungameid/1017180'; }
    async function launchExe() {
        const path = document.getElementById('exe-path').value;
        if(!path) { showToast('请配置路径', 'error'); return; }
        const res = await fetch('/api/launch-exe', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path}) });
        const data = await res.json();
        if(data.success) showToast('启动成功', 'success'); else showToast(`失败: ${data.error}`, 'error');
    }
    async function installPatcher() {
        const res = await fetch('/api/install-patcher', { method: 'POST' });
        const data = await res.json();
        if(data.success) showToast('加载器已启动', 'success'); else showToast(`失败: ${data.error}`, 'error');
    }
    function download1000Cheat() { window.open("https://github.com/32bitx64bit/Thelongdrive-distance-cheat/releases/download/download/the-long-drive-distance-cheat.reg", '_blank'); }
    
    async function browseExe() {
        const res = await fetch('/api/browse-exe', { method: 'POST' });
        const data = await res.json();
        if(data.success && data.path) { document.getElementById('exe-path').value = data.path; showToast('路径已选择', 'success'); }
        else showToast(data.error || '未选择文件', 'error');
    }

    function exportModpack() { window.location.href = '/api/export-modpack'; }

    async function importModpack(input) {
        if (input.files.length === 0) return;
        const file = input.files[0];
        const formData = new FormData();
        formData.append('file', file);
        formData.append('source', currentModpackSource);
        showToast('读取中...', 'info');
        try {
            const res = await fetch('/api/import-modpack', { method: 'POST', body: formData });
            const result = await res.json();
            if (res.ok) { showModpackResult(result.results); loadMods(currentBrowseSource); loadInstalled(currentManageSource); }
            else showToast(`Failed: ${result.error}`, 'error');
        } catch(e) { showToast('Network error', 'error'); }
        input.value = ''; 
    }
    
    function applyTheme(show_toast = true) {
        const bg = document.getElementById('bg-color').value;
        document.documentElement.style.setProperty('--bg-color', bg); document.body.style.background = bg;
        localStorage.setItem('theme', JSON.stringify({bg}));
        if (show_toast) showToast('主题已应用', 'success');
    }
    function resetTheme() { document.getElementById('bg-color').value = "#12121a"; applyTheme(true); }
    
    async function saveSettings() {
        const cfg = { exe_path: document.getElementById('exe-path').value, use_proxy: document.getElementById('use-proxy').checked, backup_name: document.getElementById('backup-name').value };
        await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
        showToast('已保存', 'success');
    }
    
    async function loadConfig() {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        if(cfg.exe_path) document.getElementById('exe-path').value = cfg.exe_path;
        if(cfg.use_proxy !== undefined) document.getElementById('use-proxy').checked = cfg.use_proxy;
        if(cfg.backup_name) document.getElementById('backup-name').value = cfg.backup_name;
        const theme = localStorage.getItem('theme');
        if(theme) { const {bg} = JSON.parse(theme); document.getElementById('bg-color').value = bg; applyTheme(false); }
        const lic = await fetch('/api/license');
        document.getElementById('license-box').value = await lic.text();
    }

    // ==================== 浏览页多选 ====================
    function toggleSelect(filename) {
        if (selectedMods.has(filename)) selectedMods.delete(filename); else selectedMods.add(filename);
        updateBatchBar();
    }
    function selectAll() { filterMods(false).forEach(m => selectedMods.add(m.FileName)); renderMods(filterMods(false)); updateBatchBar(); }
    function invertSelection() {
        filterMods(false).forEach(m => { if (selectedMods.has(m.FileName)) selectedMods.delete(m.FileName); else selectedMods.add(m.FileName); });
        renderMods(filterMods(false)); updateBatchBar();
    }
    function clearSelection() { selectedMods.clear(); filterMods(); updateBatchBar(); }
    function updateBatchBar() {
        document.getElementById('selected-count').textContent = selectedMods.size;
        document.getElementById('batch-count').textContent = selectedMods.size;
        const bar = document.getElementById('batch-bar');
        if (selectedMods.size > 0) bar.classList.add('active'); else bar.classList.remove('active');
    }

    async function batchInstall() {
        if (selectedMods.size === 0) return;
        const filenames = Array.from(selectedMods);
        if (!confirm(`确定要批量安装选中的 ${filenames.length} 个模组吗？`)) return;
        showToast('开始批量安装...', 'info');
        try {
            const res = await fetch('/api/batch-install', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ filenames: filenames, source: currentBrowseSource }) });
            const result = await res.json();
            if (res.ok) { showModpackResult(result.results); loadMods(currentBrowseSource); loadInstalled(currentManageSource); clearSelection(); }
            else showToast(`失败: ${result.error}`, 'error');
        } catch(e) { showToast('Network error', 'error'); }
    }

    async function batchUninstall() {
        if (selectedMods.size === 0) return;
        // 需要转换 FileName 为 Name
        const modsToUninstall = allMods.filter(m => selectedMods.has(m.FileName)).map(m => m.Name);
        if (modsToUninstall.length === 0) return;
        if (!confirm(`确定要卸载选中的 ${modsToUninstall.length} 个模组吗？`)) return;
        showToast('正在批量卸载...', 'info');
        try {
            const res = await fetch('/api/batch-uninstall', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ names: modsToUninstall }) });
            const result = await res.json();
            if (res.ok) { showModpackResult(result.results); loadMods(currentBrowseSource); loadInstalled(currentManageSource); clearSelection(); }
            else showToast(`失败: ${result.error}`, 'error');
        } catch(e) {}
    }

    // ==================== 已安装页多选 ====================
    function toggleSelectInstalled(name) {
        if (selectedInstalled.has(name)) selectedInstalled.delete(name); else selectedInstalled.add(name);
        updateBatchBarInstalled();
    }
    function selectAllInstalled() { 
        const installed = allMods.filter(m => m.is_installed);
        installed.forEach(m => selectedInstalled.add(m.Name));
        loadInstalled(currentManageSource); 
        updateBatchBarInstalled(); 
    }
    function invertSelectionInstalled() {
        const installed = allMods.filter(m => m.is_installed);
        installed.forEach(m => {
            if (selectedInstalled.has(m.Name)) selectedInstalled.delete(m.Name); else selectedInstalled.add(m.Name);
        });
        loadInstalled(currentManageSource);
        updateBatchBarInstalled();
    }
    function clearSelectionInstalled() { selectedInstalled.clear(); loadInstalled(currentManageSource); updateBatchBarInstalled(); }
    function updateBatchBarInstalled() {
        document.getElementById('selected-installed-count').textContent = selectedInstalled.size;
        document.getElementById('batch-installed-count').textContent = selectedInstalled.size;
        const bar = document.getElementById('batch-bar-installed');
        if (selectedInstalled.size > 0) bar.classList.add('active'); else bar.classList.remove('active');
    }

    async function batchUpdate() {
        if (selectedInstalled.size === 0) return;
        const names = Array.from(selectedInstalled);
        if (!confirm(`确定要批量更新选中的 ${names.length} 个模组吗？`)) return;
        showToast('开始批量更新...', 'info');
        try {
            const res = await fetch('/api/batch-update', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ names: names, source: currentManageSource }) });
            const result = await res.json();
            if (res.ok) { showModpackResult(result.results); loadInstalled(currentManageSource); clearSelectionInstalled(); }
            else showToast(`失败: ${result.error}`, 'error');
        } catch(e) {}
    }

    async function batchUninstallInstalled() {
        if (selectedInstalled.size === 0) return;
        const names = Array.from(selectedInstalled);
        if (!confirm(`确定要批量卸载选中的 ${names.length} 个模组吗？`)) return;
        showToast('正在批量卸载...', 'info');
        try {
            const res = await fetch('/api/batch-uninstall', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ names: names }) });
            const result = await res.json();
            if (res.ok) { showModpackResult(result.results); loadInstalled(currentManageSource); clearSelectionInstalled(); }
            else showToast(`失败: ${result.error}`, 'error');
        } catch(e) {}
    }

    // ==================== 事件委托 ====================
    function setupDelegation() {
        ['mod-list', 'modpack-list', 'installed-list'].forEach(listId => {
            document.getElementById(listId).addEventListener('click', e => {
                const checkbox = e.target.closest('.multi-check');
                if (checkbox) {
                    // 判断是哪个页面的 checkbox
                    if (listId === 'installed-list') toggleSelectInstalled(checkbox.dataset.name);
                    else toggleSelect(checkbox.dataset.filename);
                    return;
                }

                const btn = e.target.closest('button');
                const card = e.target.closest('.mod-card');
                if (btn) {
                    e.preventDefault(); e.stopPropagation();
                    if (btn.disabled) return;
                    const data = card ? JSON.parse(card.dataset.mod) : {};
                    if (btn.classList.contains('install')) return installMod(btn, data, card);
                    if (btn.classList.contains('uninstall') || btn.classList.contains('uninstall-manage')) return uninstallMod(btn, data, card);
                    if (btn.classList.contains('update-manage')) return updateMod(btn, data, card);
                    if (btn.classList.contains('install-modpack')) return installModpack(btn, data, card);
                } else if (card) { try { showModal(JSON.parse(card.dataset.mod)); } catch (err) {} }
            });
        });
    }

    async function installMod(btn, data, card) {
        if (!data.FileName) return;
        btn.disabled = true; btn.textContent = '安装中...';
        try {
            const res = await fetch('/api/install', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ filename: data.FileName, source: currentBrowseSource }) });
            const result = await res.json();
            if (res.ok) { showToast(`✅ ${data.Name} 安装成功`, 'success'); updateCardState(card, data, true, result.new_version); }
            else {
                if (result.error.includes("Already installed")) { showToast(`${data.Name} 已安装`, 'info'); updateCardState(card, data, true); }
                else { showToast(`❌ 失败: ${result.error}`, 'error'); btn.textContent = '安装'; btn.disabled = false; }
            }
        } catch (e) { showToast('Network error', 'error'); btn.textContent = '安装'; btn.disabled = false; }
    }

    async function uninstallMod(btn, data, card) {
        if (!data.Name) return;
        if (!confirm(`确定卸载 ${data.Name} 吗?`)) return;
        btn.disabled = true; btn.textContent = '卸载中...';
        try {
            const res = await fetch('/api/uninstall', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name: data.Name }) });
            const result = await res.json();
            if (result.success) {
                showToast(`✅ ${data.Name} 已卸载`, 'success');
                const inManageTab = document.getElementById('manage-tab').classList.contains('active');
                if (inManageTab) {
                    card.remove();
                    if(document.getElementById('installed-list').querySelectorAll('.mod-card').length === 0) document.getElementById('installed-list').innerHTML = `<div class="info">未安装</div>`;
                } else { updateCardState(card, data, false); }
            } else { showToast(`❌ ${result.error}`, 'error'); btn.textContent = '卸载'; btn.disabled = false; }
        } catch(e) {}
    }

    async function updateMod(btn, data, card) {
        btn.disabled = true; btn.textContent = '更新中...';
        try {
            const res = await fetch('/api/update', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name: data.Name, source: currentManageSource }) });
            const result = await res.json();
            if (result.success) {
                showToast(`✅ 更新成功`, 'success');
                updateCardState(card, data, true, result.new_version);
                const updateBtn = card.querySelector('.update-manage');
                if(updateBtn) { updateBtn.disabled = true; updateBtn.textContent = '最新'; }
            } else { showToast(`❌ Failed: ${result.error}`, 'error'); btn.textContent = '更新'; btn.disabled = false; }
        } catch(e) {}
    }

    async function installModpack(btn, data, card) {
        if (!confirm(`确定安装模组包 ${data.Name} 吗?`)) return;
        btn.disabled = true; btn.textContent = '安装中...';
        try {
            const res = await fetch('/api/install-modpack', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ ...data, source: currentModpackSource }) });
            const result = await res.json();
            if (res.ok) { showModpackResult(result.results); loadMods(currentBrowseSource); loadInstalled(currentManageSource); }
            else showToast(`Failed: ${result.error}`, 'error');
        } catch(e) { showToast('Network error', 'error'); }
        btn.disabled = false; btn.textContent = `📦 安装`;
    }

    function updateCardState(card, data, isInstalled, newVersion = null) {
        if (!card) return;
        const actionsDiv = card.querySelector('.mod-actions');
        if (!actionsDiv) return;
        const name = data.Name;
        if (isInstalled) actionsDiv.innerHTML = `<button class="uninstall">卸载</button>`;
        else actionsDiv.innerHTML = `<button class="install">安装</button>`;
        const versionP = card.querySelector('.version');
        if (versionP && newVersion) versionP.innerHTML = `已装: ${escapeHtml(newVersion)} | 最新: ${escapeHtml(data.Version || '?')}`;
        const modIndex = allMods.findIndex(m => m.Name === name);
        if (modIndex > -1) { allMods[modIndex].is_installed = isInstalled; if(newVersion) allMods[modIndex].installed_version = newVersion; }
    }

    // ==================== 数据加载 ====================
    async function loadSources() {
        const res = await fetch('/api/sources');
        const sources = await res.json();
        const fill = (id, key, def) => {
            const sel = document.getElementById(id);
            sel.innerHTML = sources.map(s => `<option value="${s.index}">${escapeHtml(s.name)}</option>`).join('');
            const val = localStorage.getItem(key) !== null ? parseInt(localStorage.getItem(key)) : def;
            sel.value = sources.some(s => s.index === val) ? val : 0;
            return parseInt(sel.value);
        };
        currentBrowseSource = fill('source-select', 'sel_browse', 0);
        currentModpackSource = fill('modpack-source-select', 'sel_pack', 0);
        currentManageSource = fill('manage-source-select', 'sel_manage', 0);
    }

    async function loadMods(source, silent=false) {
        if(!silent) document.getElementById('mod-list').innerHTML = `<div class="loading">加载中...</div>`;
        const strict = document.getElementById('strict-mode').checked;
        const res = await fetch(`/api/mods?source=${source}&strict=${strict}`);
        const data = await res.json();
        allMods = data.mods;
        renderMods(filterMods(false));
        updateCategories();
    }

    function filterMods(render=true) {
        const term = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('category').value;
        const filtered = allMods.filter(m => (m.Name.toLowerCase().includes(term) || (m.Author||'').toLowerCase().includes(term)) && (!cat || m.Category === cat));
        if(render) renderMods(filtered);
        return filtered;
    }

    function renderMods(mods) {
        const container = document.getElementById('mod-list');
        container.className = currentView === 'grid' ? 'mod-grid' : 'mod-list';
        if (!mods.length) return container.innerHTML = `<div class="info">无结果</div>`;
        container.innerHTML = mods.map(m => `
            <div class="mod-card-wrapper">
                <input type="checkbox" class="multi-check" data-filename="${m.FileName}" ${selectedMods.has(m.FileName) ? 'checked' : ''}>
                <div class="mod-card" data-mod="${escapeHtml(JSON.stringify(m))}">
                    <div class="mod-image"><img src="${m.PictureLink || ''}" loading="lazy" onerror="this.src='${noImageSvg}'"></div>
                    <div class="mod-info">
                        <h3>${escapeHtml(m.Name)}</h3>
                        <p class="author">作者: ${escapeHtml(m.Author || '?')}</p>
                        <p class="version">版本: ${escapeHtml(m.Version || '?')}</p>
                        <p class="desc">${escapeHtml((m.Description||'').substring(0,80))}</p>
                        <div class="mod-actions">${m.is_installed ? `<button class="uninstall">卸载</button>` : `<button class="install">安装</button>`}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateCategories() {
        const cats = new Set();
        allMods.forEach(m => { if(m.Category) cats.add(m.Category); });
        const sel = document.getElementById('category');
        sel.innerHTML = `<option value="">所有分类</option>` + Array.from(cats).sort().map(c => `<option value="${c}">${c}</option>`).join('');
    }

    async function loadInstalled(source, silent=false) {
        const container = document.getElementById('installed-list');
        if(!silent) container.innerHTML = `<div class="loading">加载中...</div>`;
        const res = await fetch(`/api/mods?source=${source}`);
        const data = await res.json();
        const installed = data.mods.filter(m => m.is_installed);
        // 同步 allMods 状态
        allMods = data.mods; 
        if(!installed.length) { if(!silent) container.innerHTML = `<div class="info">未安装</div>`; return; }
        container.innerHTML = installed.map(m => `
            <div class="mod-card-wrapper">
                <input type="checkbox" class="multi-check" data-name="${m.Name}" ${selectedInstalled.has(m.Name) ? 'checked' : ''}>
                <div class="mod-card" data-mod="${escapeHtml(JSON.stringify(m))}">
                    <div class="mod-image"><img src="${m.PictureLink || ''}" loading="lazy" onerror="this.src='${noImageSvg}'"></div>
                    <div class="mod-info">
                        <h3>${escapeHtml(m.Name)}</h3>
                        <p class="version">已装: ${escapeHtml(m.installed_version || '?')} | 最新: ${escapeHtml(m.Version || '?')}</p>
                        <div class="mod-actions">
                            <button class="uninstall-manage">卸载</button>
                            <button class="update-manage" ${m.installed_version !== m.Version && m.Version ? '' : 'disabled'}>${m.installed_version !== m.Version && m.Version ? '更新' : '最新'}</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        updateBatchBarInstalled();
    }

    async function loadModpacks(source) {
        const container = document.getElementById('modpack-list');
        container.innerHTML = `<div class="loading">加载中...</div>`;
        const res = await fetch(`/api/modpacks?source=${source}`);
        const data = await res.json();
        if (!data.modpacks.length) return container.innerHTML = `<div class="info">无模组包</div>`;
        container.innerHTML = data.modpacks.map(p => `
            <div class="mod-card" data-mod="${escapeHtml(JSON.stringify(p))}">
                <div class="mod-image"><img src="${p.PictureLink || ''}" loading="lazy"></div>
                <div class="mod-info"><h3>${escapeHtml(p.Name)}</h3><div class="mod-actions"><button class="install-modpack">📦 安装</button></div></div>
            </div>
        `).join('');
    }

    // ==================== 模态框 ====================
    const modal = document.getElementById('mod-modal');
    let currentModalMod = null;
    function showModal(m) {
        currentModalMod = m;
        document.getElementById('modal-picture').src = m.PictureLink || '';
        document.getElementById('modal-title').textContent = m.Name;
        document.getElementById('modal-author').textContent = m.Author || '?';
        document.getElementById('modal-version').textContent = m.Version || '?';
        document.getElementById('modal-description').innerHTML = (m.Description || '').replace(/\n/g, '<br>');
        const insBtn = document.getElementById('modal-install-btn');
        const unBtn = document.getElementById('modal-uninstall-btn');
        if (m.is_installed) { insBtn.style.display = 'none'; unBtn.style.display = 'inline-block'; }
        else { insBtn.style.display = 'inline-block'; unBtn.style.display = 'none'; }
        modal.style.display = 'block';
    }
    document.querySelector('.close').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
    
    document.getElementById('modal-install-btn').onclick = () => {
        const btn = document.getElementById('modal-install-btn');
        const card = document.querySelector(`.mod-card[data-mod*='"Name":"${currentModalMod.Name}"']`);
        installMod(btn, currentModalMod, card);
    };
    document.getElementById('modal-uninstall-btn').onclick = () => {
        const btn = document.getElementById('modal-uninstall-btn');
        const card = document.querySelector(`.mod-card[data-mod*='"Name":"${currentModalMod.Name}"']`);
        uninstallMod(btn, currentModalMod, card);
    };
    
    function showModpackResult(results) {
        const modal = document.getElementById('modpack-result-modal');
        document.getElementById('modpack-result-list').innerHTML = Array.isArray(results) ? results.map(r => `<div>${escapeHtml(r)}</div>`).join('') : "完成";
        modal.style.display = 'block';
    }
    document.getElementById('close-result-btn').onclick = () => document.getElementById('modpack-result-modal').style.display = 'none';
    document.querySelector('.close-result').onclick = () => document.getElementById('modpack-result-modal').style.display = 'none';

    // ==================== 导航与初始化 ====================
    const navItems = document.querySelectorAll('.nav-item');
    const tabs = { browse: document.getElementById('browse-tab'), modpacks: document.getElementById('modpacks-tab'), manage: document.getElementById('manage-tab'), settings: document.getElementById('settings-tab'), about: document.getElementById('about-tab') };
    navItems.forEach(item => {
        item.addEventListener('click', () => {
            navItems.forEach(i => i.classList.remove('active')); item.classList.add('active');
            Object.values(tabs).forEach(t => t.classList.remove('active'));
            const target = item.dataset.tab;
            tabs[target].classList.add('active');
            if (target === 'manage') loadInstalled(currentManageSource);
            if (target === 'modpacks') loadModpacks(currentModpackSource);
            if (target === 'settings' || target === 'about') loadConfig();
        });
    });

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    document.getElementById('grid-view-btn').onclick = () => { currentView = 'grid'; filterMods(); document.getElementById('grid-view-btn').classList.add('active'); document.getElementById('list-view-btn').classList.remove('active'); };
    document.getElementById('list-view-btn').onclick = () => { currentView = 'list'; filterMods(); document.getElementById('list-view-btn').classList.add('active'); document.getElementById('grid-view-btn').classList.remove('active'); };
    
    document.getElementById('source-select').onchange = (e) => { currentBrowseSource = parseInt(e.target.value); localStorage.setItem('sel_browse', currentBrowseSource); clearSelection(); loadMods(currentBrowseSource); };
    document.getElementById('modpack-source-select').onchange = (e) => { currentModpackSource = parseInt(e.target.value); localStorage.setItem('sel_pack', currentModpackSource); loadModpacks(currentModpackSource); };
    document.getElementById('manage-source-select').onchange = (e) => { currentManageSource = parseInt(e.target.value); localStorage.setItem('sel_manage', currentManageSource); clearSelectionInstalled(); loadInstalled(currentManageSource); };
    
    document.getElementById('search').oninput = () => filterMods();
    document.getElementById('category').onchange = () => filterMods();

    // 任务轮询
    setInterval(async () => {
        const res = await fetch('/api/tasks');
        const tasks = await res.json();
        const c = document.getElementById('task-list');
        const count = document.getElementById('task-count');
        count.textContent = tasks.length;
        const active = tasks.filter(t => t.status !== 'completed' && t.status !== 'failed');
        if(active.length > 0) {
            c.style.display = 'block';
            c.innerHTML = active.map(t => `<div class="task-item ${t.status}"><div class="task-name">${escapeHtml(t.name)}</div><div class="task-progress-bar" style="width: ${t.progress}%"></div></div>`).join('');
        } else { c.style.display = 'none'; }
    }, 1000);

    // 启动
    loadConfig();
    loadSources().then(() => {
        loadMods(currentBrowseSource);
        loadModpacks(currentModpackSource);
        loadInstalled(currentManageSource);
    });
    setupDelegation();
</script>
</body>
</html>
