    <!-- 主内容区 -->
    <div class="main-content">

            <div id="browse-tab" class="tab-content active">

                    <div class="view-toggle">
                        <button id="select-all-btn" class="view-btn" onclick="selectAll()">全选</button>

                        <button id="clear-btn" class="view-btn" onclick="clearSelection()">已选(<span id="selected-count">0</span>)</button>

                <div class="filters">
                    <input type="text" id="search" class="search-input" data-i18n-placeholder="search_placeholder">

            <!-- 其他 Tab 内容保持不变 -->

                    <div class="view-toggle">
                        <button class="view-btn" onclick="exportModpack()">📤 导出</button>
                        <button class="view-btn" onclick="document.getElementById('import-file').click()">📥 导入</button>

                    </div>

                <div id="modpack-list" class="mod-grid"></div>
            </div>

            <div id="manage-tab" class="tab-content">
                <div class="top-bar"><div class="source-selector"><label data-i18n="data_source">📡 源:</label><select id="manage-source-select"></select></div></div>

            </div>

            <div id="settings-tab" class="tab-content">

                    <h3>🔄 更新设置</h3>

                        <button class="action-btn primary" onclick="manualCheckUpdate()">🔍 手动检查更新</button>

                    <div class="setting-row">

                    <div class="setting-row">
                        <label>旧版本备份文件名:</label>
                        <input type="text" id="backup-name" placeholder="例如: ModpackManager_old.exe">
                    </div>
                </div>

                <div class="settings-section">
                    <h3 data-i18n="ui_theme">🎨 界面设置</h3>
                    <div class="setting-row">
                        <label data-i18n="bg_color">背景颜色:</label>
                        <input type="color" id="bg-color" value="#12121a">
                        <button class="action-btn secondary" onclick="resetTheme()" style="margin-left: 10px;">重置默认</button>
                    </div>
                    <button class="action-btn primary" onclick="applyTheme()" data-i18n="apply_theme">应用主题</button>
                </div>
                
                <div class="settings-section">
                    <h3 data-i18n="language_settings">🌐 语言设置</h3>
                    <div class="setting-row">
                        <label data-i18n="ui_language">界面语言:</label>
                        <select id="lang-select" onchange="changeLanguage(this.value)">
                            <option value="auto" data-i18n="auto_system">自动</option>
                            <option value="zh">中文</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 data-i18n="feature_settings">🚀 启动设置</h3>
                    <div class="setting-row">
                        <label data-i18n="exe_path">游戏 EXE 路径:</label>
                        <input type="text" id="exe-path" placeholder="例如: C:\Games\TLD.exe">
                        <button class="action-btn secondary" onclick="browseExe()" style="margin-left:10px;" data-i18n="browse">浏览</button>
                    </div>
                    <button class="action-btn primary" onclick="saveSettings()" data-i18n="save_settings">保存设置</button>
                </div>
            </div>
            
            <div id="about-tab" class="tab-content">
                 <div class="settings-section">
                    <h3 data-i18n="about_title">ℹ️ 关于本项目</h3>
                    <p style="color:#ccc; line-height:1.6;">TLD Mod Installer 由yiqiu开发。</p>
                    <p style="color:#ccc; line-height:1.6;">联系方式qq群661726941。</p>
                    <p style="color:#ccc; line-height:1.6;">email: 2308534727@qq.com</p>
                    <p style="color:#4caf50; margin-top:10px;">许可证: AGPL-3.0</p>
                    <p style="color:#888; margin-top:5px;">当前版本: {{ version }}</p>
                </div>
                <div class="settings-section">
                    <h3 data-i18n="license">📄 许可证详情</h3>
                    <textarea id="license-box" style="width:100%; height:300px; background:#0f0f17; color:#ccc; border:1px solid #2a2a36; padding:10px;" readonly>Loading...</textarea>
                </div>
            </div>
        </div>
    </div>

    <div id="download-manager" class="download-manager">
        <div class="download-header" id="download-toggle">
            <span>📥 <span data-i18n="download_tasks">任务</span> (<span id="task-count">0</span>)</span>
        </div>
        <div id="task-list" class="task-list" style="display:none;"></div>
    </div>
    
    <!-- 批量操作工具栏 -->
    <div id="batch-bar" class="batch-bar">
        <span>已选择 <span id="batch-count">0</span> 个模组</span>
        <button class="action-btn primary" onclick="batchInstall()">批量安装</button>
        <button class="action-btn secondary" onclick="clearSelection()">取消</button>
    </div>
    
    <!-- 模态框 -->
    <div id="mod-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-image"><img id="modal-picture" src="" alt="Mod Image"></div>
            <h2 id="modal-title"></h2>
            <p><strong data-i18n="author">作者:</strong> <span id="modal-author"></span></p>
            <p><strong data-i18n="version">版本:</strong> <span id="modal-version"></span></p>
            <div id="modal-description" class="modal-description"></div>
            <div class="modal-actions">
                <button id="modal-install-btn" class="install" data-i18n="install">安装</button>
                <button id="modal-uninstall-btn" class="uninstall" style="display:none;" data-i18n="uninstall">卸载</button>
            </div>
        </div>
    </div>
    
    <div id="modpack-result-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-result">&times;</span>
            <h3>📦 安装结果</h3>
            <div id="modpack-result-list" style="max-height: 400px; overflow-y: auto; margin-top: 12px;"></div>
            <div style="text-align: right; margin-top: 16px;">
                <button id="close-result-btn" class="install">关闭</button>
            </div>
        </div>
    </div>
    
    <div id="toast-container" class="toast-container"></div>

<script>
    // ==================== 语言系统 ====================
    let translations = {};
    
    async function initLanguage() {
        let lang = localStorage.getItem('lang');
        if (!lang || lang === 'auto') {
            const navLang = navigator.language.split('-')[0];
            const supported = ['zh', 'en'];
            lang = supported.includes(navLang) ? navLang : 'en';
        }
        const savedPref = localStorage.getItem('lang') || 'auto';
        document.getElementById('lang-select').value = savedPref;
        await loadTranslations(lang);
        applyTranslations();
    }

    async function loadTranslations(lang) {
        try {
            const res = await fetch(`/api/translations?lang=${lang}`);
            translations = await res.json();
        } catch (e) { console.error('Failed to load lang', e); }
    }

    function applyTranslations() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[key]) el.textContent = translations[key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (translations[key]) el.placeholder = translations[key];
        });
    }

    function t(key, defaultText, args = {}) {
        let text = translations[key] || defaultText;
        Object.keys(args).forEach(k => { text = text.replace(new RegExp(`{${k}}`, 'g'), args[k]); });
        return text;
    }

    async function changeLanguage(val) {
        localStorage.setItem('lang', val);
        if (val === 'auto') { location.reload(); return; }
        await loadTranslations(val);
        applyTranslations();
        filterMods(); loadInstalled(currentManageSource); loadModpacks(currentModpackSource);
    }

    // ==================== 核心逻辑 ====================
    let allMods = [];
    let currentBrowseSource = 0;
    let currentModpackSource = 0;
    let currentManageSource = 0;
    let currentView = 'grid';
    let selectedMods = new Set();

    const showToast = (msg, type='info') => {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = msg;
        c.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 5000);
    };
    
    const escapeHtml = (s) => s ? s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;") : '';

    const noImageSvg = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIiB2aWV3Qm94PSIwIDAgMjAwIDIwMCI+PHJlY3Qgd2lkdGg9IjIwMCIgaGVpZ2h0PSIyMDAiIGZpbGw9IiMyYTJhMzYiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZG9taW5hbnQtYmFzZWxpbmU9Im1pZGRsZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iIzg4OCIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMjAiPk5vIEltYWdlPC90ZXh0Pjwvc3ZnPg==";

    // ==================== 更新功能 ====================
    async function manualCheckUpdate() {
        showToast('正在检查更新...', 'info');
        const res = await fetch('/api/check-update');
        const data = await res.json();
        if (data.update_available) {
            if (confirm(`发现新版本 ${data.latest}！\n点击确定立即下载并更新。\n\n更新过程中程序将自动关闭。`)) {
                performUpdate(data.download_url);
            }
        } else {
            showToast('当前已是最新版本！', 'success');
        }
    }

    async function performUpdate(url) {
        const backupName = document.getElementById('backup-name').value || 'ModpackManager_old.exe';
        try {
            const res = await fetch('/api/do-update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url: url, backup_name: backupName })
            });
            const result = await res.json();
            if (result.success) {
                showToast('更新程序已启动，主程序即将关闭...', 'success');
                setTimeout(() => window.close(), 3000);
            } else {
                showToast('更新失败: ' + result.error, 'error');
            }
        } catch(e) {
            showToast('更新请求失败', 'error');
        }
    }

    async function checkUpdate() {
        const res = await fetch('/api/check-update');
        const data = await res.json();
        if (data.update_available) {
            showToast(`<div style="color:#fff">🚀 发现新版本 <b>${data.latest}</b>！<br><span style="font-size:0.8rem; opacity:0.8">请在设置中手动更新</span></div>`, 'warning');
        }
    }

    // ==================== 功能函数 ====================
    function launchSteam() { window.location.href = 'steam://rungameid/1017180'; }
    
    async function launchExe() {
        const path = document.getElementById('exe-path').value;
        if(!path) { showToast(t('error_no_exe_path', '请配置路径'), 'error'); return; }
        const res = await fetch('/api/launch-exe', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path}) });
        const data = await res.json();
        if(data.success) showToast(t('toast_launch_success', '启动成功'), 'success'); else showToast(`${t('error_no_filename', '失败')}: ${data.error}`, 'error');
    }
    async function installPatcher() {
        const res = await fetch('/api/install-patcher', { method: 'POST' });
        const data = await res.json();
        if(data.success) showToast(t('toast_patcher_launched', '加载器已启动'), 'success'); else showToast(`${t('error_no_filename', '失败')}: ${data.error}`, 'error');
    }
    
    function download1000Cheat() {
        const url = "https://github.com/32bitx64bit/Thelongdrive-distance-cheat/releases/download/download/the-long-drive-distance-cheat.reg";
        window.open(url, '_blank');
        showToast(t('toast_downloading', '正在下载...'), 'info');
    }
    
    async function browseExe() {
        const res = await fetch('/api/browse-exe', { method: 'POST' });
        const data = await res.json();
        if(data.success && data.path) {
            document.getElementById('exe-path').value = data.path;
            showToast(t('toast_select_path', '路径已选择'), 'success');
        } else { showToast(data.error || t('error_file_select_failed', '未选择文件'), 'error'); }
    }

    function exportModpack() { window.location.href = '/api/export-modpack'; showToast('生成中...', 'info'); }

    async function importModpack(input) {
        if (input.files.length === 0) return;
        const file = input.files[0];
        const formData = new FormData();
        formData.append('file', file);
        formData.append('source', currentModpackSource);
        showToast('读取中...', 'info');
        try {
            const res = await fetch('/api/import-modpack', { method: 'POST', body: formData });
            const result = await res.json();
            if (res.ok) { showModpackResult(result.results); loadMods(currentBrowseSource); loadInstalled(currentManageSource); }
            else { showToast(`Failed: ${result.error}`, 'error'); }
        } catch(e) { showToast('Network error', 'error'); }
        input.value = ''; 
    }
    
    function applyTheme(show_toast = true) {
        const bg = document.getElementById('bg-color').value;
        document.documentElement.style.setProperty('--bg-color', bg);
        document.body.style.background = bg;
        localStorage.setItem('theme', JSON.stringify({bg}));
        if (show_toast) showToast(t('toast_theme_applied', '主题已应用'), 'success');
    }

    function resetTheme() {
        document.getElementById('bg-color').value = "#12121a";
        applyTheme(true);
    }
    
    async function saveSettings() {
        const cfg = {
            exe_path: document.getElementById('exe-path').value,
            use_proxy: document.getElementById('use-proxy').checked,
            backup_name: document.getElementById('backup-name').value
        };
        await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
        showToast(t('toast_settings_saved', '已保存'), 'success');
    }
    
    async function loadConfig() {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        if(cfg.exe_path) document.getElementById('exe-path').value = cfg.exe_path;
        if(cfg.use_proxy !== undefined) document.getElementById('use-proxy').checked = cfg.use_proxy;
        if(cfg.backup_name) document.getElementById('backup-name').value = cfg.backup_name;
        
        const theme = localStorage.getItem('theme');
        if(theme) { 
            const {bg} = JSON.parse(theme); 
            document.getElementById('bg-color').value = bg; 
            applyTheme(false);
        }
        const lic = await fetch('/api/license');
        document.getElementById('license-box').value = await lic.text();
    }

    // ==================== 多选功能 ====================
    function toggleSelect(filename) {
        if (selectedMods.has(filename)) selectedMods.delete(filename);
        else selectedMods.add(filename);
        updateBatchBar();
    }
    function selectAll() {
        const mods = filterMods(false);
        mods.forEach(m => selectedMods.add(m.FileName));
        renderMods(mods);
        updateBatchBar();
    }
    function invertSelection() {
        const mods = filterMods(false);
        mods.forEach(m => {
            if (selectedMods.has(m.FileName)) selectedMods.delete(m.FileName);
            else selectedMods.add(m.FileName);
        });
        renderMods(mods);
        updateBatchBar();
    }
    function clearSelection() {
        selectedMods.clear();
        filterMods();
        updateBatchBar();
    }
    function updateBatchBar() {
        const count = selectedMods.size;
        document.getElementById('selected-count').textContent = count;
        document.getElementById('batch-count').textContent = count;
        const bar = document.getElementById('batch-bar');
        if (count > 0) bar.classList.add('active');
        else bar.classList.remove('active');
    }

    async function batchInstall() {
        if (selectedMods.size === 0) return;
        const filenames = Array.from(selectedMods);
        if (!confirm(`确定要批量安装选中的 ${filenames.length} 个模组吗？`)) return;
        showToast('开始批量安装...', 'info');
        try {
            const res = await fetch('/api/batch-install', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ filenames: filenames, source: currentBrowseSource })
            });
            const result = await res.json();
            if (res.ok) { showModpackResult(result.results); loadMods(currentBrowseSource); loadInstalled(currentManageSource); clearSelection(); }
            else { showToast(`批量安装失败: ${result.error}`, 'error'); }
        } catch(e) { showToast('Network error', 'error'); }
    }

    // ==================== 事件委托 ====================
    function setupDelegation() {
        ['mod-list', 'modpack-list', 'installed-list'].forEach(listId => {
            document.getElementById(listId).addEventListener('click', e => {
                const checkbox = e.target.closest('.multi-check');
                if (checkbox) { toggleSelect(checkbox.dataset.filename); return; }

                const btn = e.target.closest('button');
                const card = e.target.closest('.mod-card');
                if (btn) {
                    e.preventDefault(); e.stopPropagation();
                    if (btn.disabled) return;
                    const data = card ? JSON.parse(card.dataset.mod) : {};
                    if (btn.classList.contains('install')) return installMod(btn, data, card);
                    if (btn.classList.contains('uninstall') || btn.classList.contains('uninstall-manage')) return uninstallMod(btn, data, card);
                    if (btn.classList.contains('update-manage')) return updateMod(btn, data, card);
                    if (btn.classList.contains('install-modpack')) return installModpack(btn, data, card);
                } else if (card) { try { showModal(JSON.parse(card.dataset.mod)); } catch (err) {} }
            });
        });
    }

    async function installMod(btn, data, card) {
        if (!data.FileName) return;
        btn.disabled = true; btn.textContent = t('loading', '安装中...');
        try {
            const res = await fetch('/api/install', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ filename: data.FileName, source: currentBrowseSource }) });
            const result = await res.json();
            if (res.ok) { showToast(`✅ ${data.Name} ${t('toast_install_success', '安装成功')}`, 'success'); updateCardState(card, data, true, result.new_version); }
            else {
                if (result.error && result.error.includes("Already installed")) { showToast(`${data.Name} ${t('installed', '已安装')}`, 'info'); updateCardState(card, data, true); }
                else { showToast(`❌ ${t('error_no_filename', '失败')}: ${result.error}`, 'error'); btn.textContent = t('install', '安装'); btn.disabled = false; }
            }
        } catch (e) { showToast('Network error', 'error'); btn.textContent = t('install', '安装'); btn.disabled = false; }
    }

    async function uninstallMod(btn, data, card) {
        if (!data.Name) return;
        if (!confirm(t('confirm_uninstall', '确定卸载 {name} 吗?', {name: data.Name}))) return;
        btn.disabled = true; btn.textContent = t('loading', '卸载中...');
        try {
            const res = await fetch('/api/uninstall', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name: data.Name }) });
            const result = await res.json();
            if (res.ok) {
                showToast(`✅ ${data.Name} ${t('toast_uninstall_success', '已卸载')}`, 'success');
                const inManageTab = document.getElementById('manage-tab').classList.contains('active');
                if (inManageTab) {
                    card.remove();
                    if(document.getElementById('installed-list').querySelectorAll('.mod-card').length === 0) document.getElementById('installed-list').innerHTML = `<div class="info">${t('no_mods_found', '未安装')}</div>`;
                } else { updateCardState(card, data, false); }
            } else { showToast(`❌ ${result.error}`, 'error'); btn.textContent = t('uninstall', '卸载'); btn.disabled = false; }
        } catch(e) {}
    }

    async function updateMod(btn, data, card) {
        btn.disabled = true; btn.textContent = t('loading', '更新中...');
        try {
            const res = await fetch('/api/update', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name: data.Name, source: currentManageSource }) });
            const result = await res.json();
            if (res.ok) {
                showToast(`✅ ${t('toast_update_success', '更新成功')}`, 'success');
                updateCardState(card, data, true, result.new_version);
                const updateBtn = card.querySelector('.update-manage');
                if(updateBtn) { updateBtn.disabled = true; updateBtn.textContent = t('latest', '最新'); }
            } else { showToast(`❌ Failed: ${result.error}`, 'error'); btn.textContent = t('update', '更新'); btn.disabled = false; }
        } catch(e) {}
    }

    async function installModpack(btn, data, card) {
        if (!confirm(t('confirm_modpack_install', '确定安装模组包 {name} 吗?', {name: data.Name}))) return;
        btn.disabled = true; btn.textContent = t('loading', '安装中...');
        try {
            const res = await fetch('/api/install-modpack', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ ...data, source: currentModpackSource }) });
            const result = await res.json();
            if (res.ok) { showModpackResult(result.results); loadMods(currentBrowseSource); loadInstalled(currentManageState); }
            else { showToast(`Failed: ${result.error}`, 'error'); }
        } catch(e) { showToast('Network error', 'error'); }
        btn.disabled = false; btn.textContent = `📦 ${t('install', '安装')}`;
    }

    function updateCardState(card, data, isInstalled, newVersion = null) {
        if (!card) return;
        const actionsDiv = card.querySelector('.mod-actions');
        if (!actionsDiv) return;
        const name = data.Name;
        if (isInstalled) actionsDiv.innerHTML = `<button class="uninstall">${t('uninstall', '卸载')}</button>`;
        else actionsDiv.innerHTML = `<button class="install">${t('install', '安装')}</button>`;
        const versionP = card.querySelector('.version');
        if (versionP && newVersion) versionP.innerHTML = `${t('installed', '已装')}: ${escapeHtml(newVersion)} | ${t('latest', '最新')}: ${escapeHtml(data.Version || '?')}`;
        const modIndex = allMods.findIndex(m => m.Name === name);
        if (modIndex > -1) { allMods[modIndex].is_installed = isInstalled; if(newVersion) allMods[modIndex].installed_version = newVersion; }
    }

    // ==================== 数据加载 ====================
    async function loadSources() {
        const res = await fetch('/api/sources');
        const sources = await res.json();
        const fill = (id, key, def) => {
            const sel = document.getElementById(id);
            sel.innerHTML = sources.map(s => `<option value="${s.index}">${escapeHtml(s.name)}</option>`).join('');
            const val = localStorage.getItem(key) !== null ? parseInt(localStorage.getItem(key)) : def;
            const finalVal = sources.some(s => s.index === val) ? val : 0;
            sel.value = finalVal;
            return finalVal;
        };
        currentBrowseSource = fill('source-select', 'sel_browse', 0);
        currentModpackSource = fill('modpack-source-select', 'sel_pack', 0);
        currentManageSource = fill('manage-source-select', 'sel_manage', 0);
    }

    async function loadMods(source, silent=false) {
        if(!silent) document.getElementById('mod-list').innerHTML = `<div class="loading">${t('loading', '加载中...')}</div>`;
        const strict = document.getElementById('strict-mode').checked;
        const res = await fetch(`/api/mods?source=${source}&strict=${strict}`);
        const data = await res.json();
        allMods = data.mods;
        renderMods(filterMods(false));
        updateCategories();
    }

    function filterMods(render=true) {
        const term = document.getElementById('search').value.toLowerCase();
        const cat = document.getElementById('category').value;
        const filtered = allMods.filter(m => (m.Name.toLowerCase().includes(term) || (m.Author||'').toLowerCase().includes(term)) && (!cat || m.Category === cat));
        if(render) renderMods(filtered);
        return filtered;
    }

    function renderMods(mods) {
        const container = document.getElementById('mod-list');
        container.className = currentView === 'grid' ? 'mod-grid' : 'mod-list';
        if (!mods.length) return container.innerHTML = `<div class="info">${t('no_mods_found', '无结果')}</div>`;
        container.innerHTML = mods.map(m => `
            <div class="mod-card-wrapper">
                <input type="checkbox" class="multi-check" data-filename="${m.FileName}" ${selectedMods.has(m.FileName) ? 'checked' : ''} title="选择">
                <div class="mod-card" data-mod="${escapeHtml(JSON.stringify(m))}">
                    <div class="mod-image"><img src="${m.PictureLink || ''}" loading="lazy" onerror="this.onerror=null; this.src='${noImageSvg}'"></div>
                    <div class="mod-info">
                        <h3>${escapeHtml(m.Name)}</h3>
                        <p class="author">${t('author', '作者')}: ${escapeHtml(m.Author || '?')}</p>
                        <p class="version">${t('version', '版本')}: ${escapeHtml(m.Version || '?')}</p>
                        <p class="desc">${escapeHtml((m.Description||'').substring(0,80))}</p>
                        <div class="mod-actions">
                            ${m.is_installed ? `<button class="uninstall">${t('uninstall', '卸载')}</button>` : `<button class="install">${t('install', '安装')}</button>`}
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateCategories() {
        const cats = new Set();
        allMods.forEach(m => { if(m.Category) cats.add(m.Category); });
        const sel = document.getElementById('category');
        sel.innerHTML = `<option value="" data-i18n="all_categories">${t('all_categories', '所有分类')}</option>` + Array.from(cats).sort().map(c => `<option value="${c}">${c}</option>`).join('');
    }

    async function loadInstalled(source, silent=false) {
        const container = document.getElementById('installed-list');
        if(!silent) container.innerHTML = `<div class="loading">${t('loading', '加载中...')}</div>`;
        const res = await fetch(`/api/mods?source=${source}`);
        const data = await res.json();
        const installed = data.mods.filter(m => m.is_installed);
        if(!installed.length) { if(!silent) container.innerHTML = `<div class="info">${t('no_mods_found', '未安装')}</div>`; return; }
        container.innerHTML = installed.map(m => `
            <div class="mod-card" data-mod="${escapeHtml(JSON.stringify(m))}">
                <div class="mod-image"><img src="${m.PictureLink || ''}" loading="lazy" onerror="this.onerror=null; this.src='${noImageSvg}'"></div>
                <div class="mod-info">
                    <h3>${escapeHtml(m.Name)}</h3>
                    <p class="version">${t('installed', '已装')}: ${escapeHtml(m.installed_version || '?')} | ${t('latest', '最新')}: ${escapeHtml(m.Version || '?')}</p>
                    <div class="mod-actions">
                        <button class="uninstall-manage">${t('uninstall', '卸载')}</button>
                        <button class="update-manage" ${m.installed_version !== m.Version && m.Version ? '' : 'disabled'}>${m.installed_version !== m.Version && m.Version ? t('update', '更新') : t('latest', '最新')}</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function loadModpacks(source) {
        const container = document.getElementById('modpack-list');
        container.innerHTML = `<div class="loading">${t('loading', '加载中...')}</div>`;
        const res = await fetch(`/api/modpacks?source=${source}`);
        const data = await res.json();
        if (!data.modpacks.length) return container.innerHTML = `<div class="info">${t('no_mods_found', '无模组包')}</div>`;
        container.innerHTML = data.modpacks.map(p => `
            <div class="mod-card" data-mod="${escapeHtml(JSON.stringify(p))}">
                <div class="mod-image"><img src="${p.PictureLink || ''}" loading="lazy" onerror="this.onerror=null; this.src='${noImageSvg}'"></div>
                <div class="mod-info">
                    <h3>${escapeHtml(p.Name)}</h3>
                    <div class="mod-actions">
                        <button class="install-modpack">📦 ${t('install', '安装')}</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ==================== 模态框 ====================
    const modal = document.getElementById('mod-modal');
    let currentModalMod = null;
    function showModal(m) {
        currentModalMod = m;
        document.getElementById('modal-picture').src = m.PictureLink || '';
        document.getElementById('modal-title').textContent = m.Name;
        document.getElementById('modal-author').textContent = m.Author || '?';
        document.getElementById('modal-version').textContent = m.Version || '?';
        document.getElementById('modal-description').innerHTML = (m.Description || '').replace(/\n/g, '<br>');
        const insBtn = document.getElementById('modal-install-btn');
        const unBtn = document.getElementById('modal-uninstall-btn');
        if (m.is_installed) { insBtn.style.display = 'none'; unBtn.style.display = 'inline-block'; }
        else { insBtn.style.display = 'inline-block'; unBtn.style.display = 'none'; }
        modal.style.display = 'block';
    }
    document.querySelector('.close').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
    
    document.getElementById('modal-install-btn').onclick = () => {
        const btn = document.getElementById('modal-install-btn');
        const card = document.querySelector(`.mod-card[data-mod*='"Name":"${currentModalMod.Name}"']`);
        installMod(btn, currentModalMod, card);
    };
    document.getElementById('modal-uninstall-btn').onclick = () => {
        const btn = document.getElementById('modal-uninstall-btn');
        const card = document.querySelector(`.mod-card[data-mod*='"Name":"${currentModalMod.Name}"']`);
        uninstallMod(btn, currentModalMod, card);
    };
    
    function showModpackResult(results) {
        const modal = document.getElementById('modpack-result-modal');
        const htmlContent = Array.isArray(results) ? results.map(r => `<div>${escapeHtml(r)}</div>`).join('') : "完成";
        document.getElementById('modpack-result-list').innerHTML = htmlContent;
        modal.style.display = 'block';
    }
    document.getElementById('close-result-btn').onclick = () => document.getElementById('modpack-result-modal').style.display = 'none';
    document.querySelector('.close-result').onclick = () => document.getElementById('modpack-result-modal').style.display = 'none';

    // ==================== 导航与初始化 ====================
    const navItems = document.querySelectorAll('.nav-item');
    const tabs = { browse: document.getElementById('browse-tab'), modpacks: document.getElementById('modpacks-tab'), manage: document.getElementById('manage-tab'), settings: document.getElementById('settings-tab'), about: document.getElementById('about-tab') };
    navItems.forEach(item => {
        item.addEventListener('click', () => {
            navItems.forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            Object.values(tabs).forEach(t => t.classList.remove('active'));
            const target = item.dataset.tab;
            tabs[target].classList.add('active');
            if (target === 'manage') loadInstalled(currentManageSource);
            if (target === 'modpacks') loadModpacks(currentModpackSource);
            if (target === 'settings' || target === 'about') loadConfig();
        });
    });

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    // **修复**：视图切换按钮逻辑
    document.getElementById('grid-view-btn').onclick = () => {
        currentView = 'grid'; filterMods();
        document.getElementById('grid-view-btn').classList.add('active');
        document.getElementById('list-view-btn').classList.remove('active');
    };
    document.getElementById('list-view-btn').onclick = () => {
        currentView = 'list'; filterMods();
        document.getElementById('list-view-btn').classList.add('active');
        document.getElementById('grid-view-btn').classList.remove('active');
    };
    
    document.getElementById('strict-mode').onchange = (e) => { loadMods(currentBrowseSource); };
    
    document.getElementById('source-select').onchange = (e) => { currentBrowseSource = parseInt(e.target.value); localStorage.setItem('sel_browse', currentBrowseSource); clearSelection(); loadMods(currentBrowseSource); };
    document.getElementById('modpack-source-select').onchange = (e) => { currentModpackSource = parseInt(e.target.value); localStorage.setItem('sel_pack', currentModpackSource); loadModpacks(currentModpackSource); };
    document.getElementById('manage-source-select').onchange = (e) => { currentManageSource = parseInt(e.target.value); localStorage.setItem('sel_manage', currentManageSource); loadInstalled(currentManageSource); };
    
    document.getElementById('search').oninput = () => filterMods();
    document.getElementById('category').onchange = () => filterMods();

    // 任务轮询
    setInterval(async () => {
        const res = await fetch('/api/tasks');
        const tasks = await res.json();
        const c = document.getElementById('task-list');
        const count = document.getElementById('task-count');
        count.textContent = tasks.length;
        const active = tasks.filter(t => t.status !== 'completed' && t.status !== 'failed');
        if(active.length > 0) {
            c.style.display = 'block';
            c.innerHTML = active.map(t => `<div class="task-item ${t.status}"><div class="task-name">${escapeHtml(t.name)}</div><div class="task-progress-bar" style="width: ${t.progress}%"></div></div>`).join('');
        } else { c.style.display = 'none'; }
    }, 1000);

    // 启动
    initLanguage().then(() => {
        loadSources().then(() => {
            loadMods(currentBrowseSource);
            loadModpacks(currentModpackSource);
            loadInstalled(currentManageSource);
            loadConfig();
            checkUpdate();
        });
        setupDelegation();
    });
</script>
</body>
</html>
