name: Manual PyInstaller Build

on:
  workflow_dispatch:
    inputs:
      additional_args:
        description: '额外传递给 PyInstaller 的参数'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: windows-latest  # PyInstaller 打包 Windows exe 最好用 Windows
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: |
        # 先删除旧的 dist 目录（如果有）
        Remove-Item -Path dist -Recurse -Force -ErrorAction SilentlyContinue
        pyinstaller build.spec ${{ github.event.inputs.additional_args }}
    
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: ModpackManager
        path: dist/ModpackManager.exe  # 只上传单个 exe 文件
        retention-days: 7
    
    # 可选：同时上传到 Release（如果打了 tag）
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/ModpackManager.exe
        generate_release_notes: true
