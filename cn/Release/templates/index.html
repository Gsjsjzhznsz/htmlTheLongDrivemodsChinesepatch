<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>长途旅行模组安装器</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='tld.ico') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='tld.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🚗 长途旅行模组安装器</h1>
        <div class="tabs">
            <button class="tab-button active" data-tab="browse">📦 浏览模组</button>
            <button class="tab-button" data-tab="modpacks">📚 模组包</button>
            <button class="tab-button" data-tab="manage">🔧 已安装模组</button>
        </div>

        <!-- 浏览模组标签页 -->
        <div id="browse-tab" class="tab-content active">
            <div class="top-bar">
                <div class="source-selector">
                    <label>📡 数据源：</label>
                    <select id="source-select">
                        <option value="0">加载中...</option>
                    </select>
                </div>
                <div class="view-toggle">
                    <button id="grid-view-btn" class="view-btn active">🖼️ 卡片视图</button>
                    <button id="list-view-btn" class="view-btn">📄 列表视图</button>
                </div>
            </div>
            <div class="filters">
                <input type="text" id="search" placeholder="搜索模组名称或作者..." class="search-input">
                <select id="category" class="category-select">
                    <option value="">所有分类</option>
                </select>
            </div>
            <div id="mod-list" class="mod-grid">
                <div class="loading">加载模组列表中...</div>
            </div>
        </div>

        <!-- 模组包标签页 -->
        <div id="modpacks-tab" class="tab-content">
            <div class="top-bar" style="justify-content: flex-end;">
                <div class="source-selector">
                    <label>📡 数据源：</label>
                    <select id="modpack-source-select">
                        <option value="0">加载中...</option>
                    </select>
                </div>
            </div>
            <div id="modpack-list" class="mod-grid">
                <div class="loading">加载模组包列表中...</div>
            </div>
        </div>

        <!-- 已安装模组标签页 -->
<!-- 已安装模组标签页 -->
<div id="manage-tab" class="tab-content">
    <div class="top-bar" style="justify-content: flex-end;">
        <div class="source-selector">
            <label>📡 数据源：</label>
            <select id="manage-source-select">
                <option value="0">加载中...</option>
            </select>
        </div>
    </div>
    <div id="installed-list" class="mod-grid">
        <div class="loading">加载中...</div>
    </div>
</div>

    <!-- 下载管理器 -->
    <div id="download-manager" class="download-manager collapsed">
        <div class="download-header" id="download-toggle">
            <span>📥 下载任务</span>
            <span id="global-speed"></span>
            <span id="global-progress"></span>
        </div>
        <div id="task-list" class="task-list"></div>
    </div>

    <!-- QQ群悬浮 -->
    <div id="qq-group" class="qq-group">
        <div class="qq-icon">🐧</div>
        <div class="qq-popup">
            <p>🚗 长途旅行交流群</p>
            <p>📢 群号: <strong>661726941</strong></p>
            <a href="https://qm.qq.com/q/jZyUk3D3rO" target="_blank">🔗 点击加入</a>
        </div>
    </div>

    <!-- 模组详情模态框 -->
    <div id="mod-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-image">
                <img id="modal-picture" src="" alt="模组图片">
            </div>
            <h2 id="modal-title"></h2>
            <p><strong>作者:</strong> <span id="modal-author"></span></p>
            <p><strong>版本:</strong> <span id="modal-version"></span> | <strong>分类:</strong> <span id="modal-category"></span></p>
            <p><strong>发布日期:</strong> <span id="modal-date"></span></p>
            <p><strong>依赖:</strong> <span id="modal-dependency"></span></p>
            <p><strong>描述:</strong></p>
            <div id="modal-description" class="modal-description"></div>
            <div class="modal-actions">
                <button id="modal-install-btn" class="install">安装</button>
                <button id="modal-uninstall-btn" class="uninstall" style="display:none;">卸载</button>
            </div>
        </div>
    </div>

<script>
    let allMods = [];
    let allModpacks = [];
    let categories = new Set();
    let currentCategory = '';
    let currentSearch = '';
    let currentView = 'grid';
    let taskInterval = null;

    // 各页面的当前源索引（独立存储）
    let currentBrowseSource = 0;
    let currentModpackSource = 0;
    let currentManageSource = 0;

    // ==================== 下载管理器 ====================
    function startTaskPolling() {
        if (taskInterval) clearInterval(taskInterval);
        taskInterval = setInterval(async () => {
            try {
                const res = await fetch('/api/tasks');
                const tasks = await res.json();
                updateTaskList(tasks);
                updateGlobalProgress(tasks);
            } catch (e) {
                console.error('获取任务失败', e);
            }
        }, 500);
    }

    function updateTaskList(tasks) {
        const container = document.getElementById('task-list');
        if (!tasks.length) {
            container.innerHTML = '<div style="padding:8px;text-align:center;">暂无任务</div>';
            return;
        }
        container.innerHTML = tasks.map(task => {
            let statusText = '';
            if (task.status === 'pending') statusText = '⏳ 等待中';
            else if (task.status === 'downloading') statusText = `⬇️ ${task.progress.toFixed(0)}%`;
            else if (task.status === 'completed') statusText = '✅ 完成';
            else if (task.status === 'failed') statusText = '❌ 失败';
            return `
                <div class="task-item">
                    <div class="task-name">${escapeHtml(task.name)}</div>
                    <div class="task-progress-bar" style="width: ${task.progress}%"></div>
                    <div class="task-stats">
                        <span>${statusText}</span>
                        <span>${(task.speed / 1024).toFixed(1)} KB/s</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateGlobalProgress(tasks) {
        const activeTasks = tasks.filter(t => t.status === 'downloading');
        if (activeTasks.length === 0) {
            document.getElementById('global-speed').textContent = '';
            document.getElementById('global-progress').textContent = '';
            return;
        }
        const totalSpeed = activeTasks.reduce((sum, t) => sum + t.speed, 0);
        const avgProgress = activeTasks.reduce((sum, t) => sum + t.progress, 0) / activeTasks.length;
        document.getElementById('global-speed').textContent = `⚡ ${(totalSpeed / 1024).toFixed(1)} KB/s`;
        document.getElementById('global-progress').textContent = `${avgProgress.toFixed(0)}%`;
    }

    document.getElementById('download-toggle').onclick = () => {
        const manager = document.getElementById('download-manager');
        manager.classList.toggle('collapsed');
    };

    // ==================== 源加载 ====================
    async function loadSources() {
        try {
            const res = await fetch('/api/sources');
            const sources = await res.json();
            
            // 浏览页面源选择器
            const browseSelect = document.getElementById('source-select');
            if (browseSelect) {
                browseSelect.innerHTML = sources.map(s => `<option value="${s.index}">${s.name}</option>`).join('');
                const saved = localStorage.getItem('selected_browse_source');
                currentBrowseSource = saved !== null ? parseInt(saved) : 0;
                browseSelect.value = currentBrowseSource;
            }
            
            // 模组包页面源选择器
            const modpackSelect = document.getElementById('modpack-source-select');
            if (modpackSelect) {
                modpackSelect.innerHTML = sources.map(s => `<option value="${s.index}">${s.name}</option>`).join('');
                const savedPack = localStorage.getItem('selected_modpack_source');
                currentModpackSource = savedPack !== null ? parseInt(savedPack) : 0;
                modpackSelect.value = currentModpackSource;
            }
            
            // 已安装页面源选择器
            const manageSelect = document.getElementById('manage-source-select');
            if (manageSelect) {
                manageSelect.innerHTML = sources.map(s => `<option value="${s.index}">${s.name}</option>`).join('');
                const savedManage = localStorage.getItem('selected_manage_source');
                if (savedManage !== null) {
                    currentManageSource = parseInt(savedManage);
                    manageSelect.value = currentManageSource;
                } else {
                    currentManageSource = currentBrowseSource;
                    manageSelect.value = currentManageSource;
                    localStorage.setItem('selected_manage_source', currentManageSource);
                }
            }
        } catch (e) {
            console.error('加载源列表失败', e);
            const selects = ['source-select', 'modpack-source-select', 'manage-source-select'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = '<option value="0">加载失败</option>';
            });
        }
    }

    // ==================== 模组列表加载 ====================
    async function loadMods(source) {
        const container = document.getElementById('mod-list');
        container.innerHTML = '<div class="loading">加载模组列表中...</div>';
        try {
            const res = await fetch(`/api/mods?source=${source}`);
            const data = await res.json();
            allMods = data.mods;
            if (data.active_source !== undefined) {
                currentBrowseSource = data.active_source;
                const select = document.getElementById('source-select');
                if (select && select.value != data.active_source) select.value = data.active_source;
            }
            updateCategories();
            filterMods();
        } catch (err) {
            container.innerHTML = '<div class="error">加载失败，请确保后端运行中</div>';
        }
    }

    function updateCategories() {
        categories.clear();
        allMods.forEach(mod => {
            if (mod.Category) categories.add(mod.Category);
        });
        const catSelect = document.getElementById('category');
        catSelect.innerHTML = '<option value="">所有分类</option>';
        Array.from(categories).sort().forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            catSelect.appendChild(option);
        });
    }

    function filterMods() {
        const searchTerm = document.getElementById('search').value.toLowerCase();
        const category = document.getElementById('category').value;
        currentSearch = searchTerm;
        currentCategory = category;
        const filtered = allMods.filter(mod => {
            const matchSearch = mod.Name.toLowerCase().includes(searchTerm) ||
                                (mod.Author && mod.Author.toLowerCase().includes(searchTerm));
            const matchCat = category === '' || mod.Category === category;
            return matchSearch && matchCat;
        });
        renderMods(filtered);
    }

    function renderMods(mods) {
        const container = document.getElementById('mod-list');
        if (!mods.length) {
            container.innerHTML = '<div class="info">没有找到模组</div>';
            return;
        }
        container.innerHTML = mods.map(mod => `
            <div class="mod-card" data-mod='${escapeHtml(JSON.stringify(mod))}'>
                <div class="mod-image">
                    <img src="${mod.PictureLink || 'https://via.placeholder.com/200x200?text=No+Image'}" 
                         loading="lazy"
                         onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'"
                         alt="${escapeHtml(mod.Name)}">
                </div>
                <div class="mod-info">
                    <h3>${escapeHtml(mod.Name)}</h3>
                    <p class="author">作者: ${escapeHtml(mod.Author || '未知')}</p>
                    <p class="version">版本: ${escapeHtml(mod.Version || '?')}</p>
                    <p class="desc">${escapeHtml(mod.Description ? mod.Description.substring(0, 100) + (mod.Description.length > 100 ? '...' : '') : '暂无描述')}</p>
                    <div class="mod-actions">
                        ${mod.is_installed ? 
                            `<button class="uninstall" data-name="${escapeHtml(mod.Name)}" data-filename="${escapeHtml(mod.FileName)}">卸载</button>` : 
                            `<button class="install" data-filename="${escapeHtml(mod.FileName)}" data-name="${escapeHtml(mod.Name)}">安装</button>`
                        }
                    </div>
                </div>
            </div>
        `).join('');

        bindCardEvents();
        bindButtonEvents();
    }

    function bindCardEvents() {
        document.querySelectorAll('.mod-card').forEach(card => {
            card.removeEventListener('click', card._clickHandler);
            const handler = (e) => {
                if (e.target.tagName === 'BUTTON') return;
                try {
                    const mod = JSON.parse(card.dataset.mod);
                    showModal(mod);
                } catch (e) { }
            };
            card.addEventListener('click', handler);
            card._clickHandler = handler;
        });
    }

    function bindButtonEvents() {
        document.querySelectorAll('.install').forEach(btn => {
            btn.removeEventListener('click', btn._clickHandler);
            const handler = async (e) => {
                e.stopPropagation();
                const filename = btn.dataset.filename;
                const name = btn.dataset.name;
                btn.disabled = true;
                btn.textContent = '安装中...';
                try {
                    const res = await fetch('/api/install', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        alert(`✅ ${name} 安装成功！`);
                        await loadMods(currentBrowseSource);
                        await loadInstalled(currentManageSource);
                    } else {
                        alert(`❌ 安装失败: ${data.error}`);
                        btn.disabled = false;
                        btn.textContent = '安装';
                    }
                } catch (err) {
                    alert('网络错误');
                    btn.disabled = false;
                    btn.textContent = '安装';
                }
            };
            btn.addEventListener('click', handler);
            btn._clickHandler = handler;
        });

        document.querySelectorAll('.uninstall').forEach(btn => {
            btn.removeEventListener('click', btn._clickHandler);
            const handler = async (e) => {
                e.stopPropagation();
                const name = btn.dataset.name;
                if (!confirm(`确定要卸载模组 "${name}" 吗？`)) return;
                btn.disabled = true;
                btn.textContent = '卸载中...';
                try {
                    const res = await fetch('/api/uninstall', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        alert(`✅ ${name} 卸载成功！`);
                        await loadMods(currentBrowseSource);
                        await loadInstalled(currentManageSource);
                    } else {
                        alert(`❌ 卸载失败: ${data.error}`);
                        btn.disabled = false;
                        btn.textContent = '卸载';
                    }
                } catch (err) {
                    alert('网络错误');
                    btn.disabled = false;
                    btn.textContent = '卸载';
                }
            };
            btn.addEventListener('click', handler);
            btn._clickHandler = handler;
        });
    }

    // ==================== 模组包加载 ====================
    async function loadModpacks(source) {
        const container = document.getElementById('modpack-list');
        container.innerHTML = '<div class="loading">加载模组包列表中...</div>';
        try {
            const res = await fetch(`/api/modpacks?source=${source}`);
            const data = await res.json();
            allModpacks = data.modpacks;
            if (data.active_source !== undefined) {
                currentModpackSource = data.active_source;
                const select = document.getElementById('modpack-source-select');
                if (select && select.value != data.active_source) select.value = data.active_source;
            }
            if (!allModpacks.length) {
                container.innerHTML = '<div class="info">暂无模组包</div>';
                return;
            }
            container.innerHTML = allModpacks.map(pack => `
                <div class="mod-card">
                    <div class="mod-image">
                        <img src="${pack.PictureLink || 'https://via.placeholder.com/200x200?text=No+Image'}" 
                             loading="lazy"
                             onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'"
                             alt="${escapeHtml(pack.Name)}">
                    </div>
                    <div class="mod-info">
                        <h3>${escapeHtml(pack.Name)}</h3>
                        <p class="author">作者: ${escapeHtml(pack.Author || '未知')}</p>
                        <p class="version">版本: ${escapeHtml(pack.Version || '?')}</p>
                        <p class="desc">${escapeHtml(pack.Description ? pack.Description.substring(0, 100) + (pack.Description.length > 100 ? '...' : '') : '暂无描述')}</p>
                        <div class="mod-actions">
                            <button class="install-modpack" data-pack='${escapeHtml(JSON.stringify(pack))}'>📦 安装模组包</button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.install-modpack').forEach(btn => {
                btn.removeEventListener('click', btn._clickHandler);
                const handler = async (e) => {
                    e.stopPropagation();
                    const pack = JSON.parse(btn.dataset.pack);
                    if (!confirm(`确定要安装模组包 "${pack.Name}" 吗？\n这会安装包内包含的所有模组。`)) return;
                    btn.disabled = true;
                    btn.textContent = '安装中...';
                    try {
                        const res = await fetch('/api/install-modpack', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(pack)
                        });
                        const data = await res.json();
                        if (res.ok) {
                            alert(`模组包安装完成:\n${data.results.join('\n')}`);
                            await loadMods(currentBrowseSource);
                            await loadInstalled(currentManageSource);
                        } else {
                            alert(`安装失败: ${data.error}`);
                        }
                    } catch (err) {
                        alert('网络错误');
                    }
                    btn.disabled = false;
                    btn.textContent = '📦 安装模组包';
                };
                btn.addEventListener('click', handler);
                btn._clickHandler = handler;
            });
        } catch (err) {
            container.innerHTML = '<div class="error">加载模组包失败</div>';
        }
    }

    // ==================== 已安装模组管理 ====================
    async function loadInstalled(source = currentManageSource) {
        const container = document.getElementById('installed-list');
        container.innerHTML = '<div class="loading">加载中...</div>';
        try {
            const res = await fetch(`/api/mods?source=${source}`);
            const data = await res.json();
            
            if (data.active_source !== undefined) {
                currentManageSource = data.active_source;
                const manageSelect = document.getElementById('manage-source-select');
                if (manageSelect && manageSelect.value != data.active_source) {
                    manageSelect.value = data.active_source;
                    localStorage.setItem('selected_manage_source', data.active_source);
                }
            }
            
            const installedMods = data.mods.filter(mod => mod.is_installed);
            if (!installedMods.length) {
                container.innerHTML = '<div class="info">暂无已安装模组</div>';
                return;
            }
            
            container.innerHTML = installedMods.map(mod => {
                const needUpdate = mod.installed_version !== mod.Version && mod.Version;
                return `
                    <div class="mod-card">
                        <div class="mod-image">
                            <img src="${mod.PictureLink || 'https://via.placeholder.com/200x200?text=No+Image'}" 
                                 loading="lazy"
                                 onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'"
                                 alt="${escapeHtml(mod.Name)}">
                        </div>
                        <div class="mod-info">
                            <h3>${escapeHtml(mod.Name)}</h3>
                            <p class="author">作者: ${escapeHtml(mod.Author || '未知')}</p>
                            <p class="version">已安装: ${escapeHtml(mod.installed_version || '?')} | 最新: ${escapeHtml(mod.Version || '?')}</p>
                            <p class="desc">${escapeHtml(mod.Description ? mod.Description.substring(0, 100) + (mod.Description.length > 100 ? '...' : '') : '暂无描述')}</p>
                            <div class="mod-actions">
                                <button class="uninstall-manage" data-name="${escapeHtml(mod.Name)}">卸载</button>
                                <button class="update-manage" data-name="${escapeHtml(mod.Name)}" ${needUpdate ? '' : 'disabled'}>${needUpdate ? '更新' : '已是最新'}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            bindManageButtons();
        } catch (err) {
            console.error('加载已安装模组失败:', err);
            container.innerHTML = '<div class="error">加载失败</div>';
        }
    }

    function bindManageButtons() {
        document.querySelectorAll('.uninstall-manage').forEach(btn => {
            btn.removeEventListener('click', btn._clickHandler);
            const handler = async (e) => {
                const name = btn.dataset.name;
                if (!confirm(`确定要卸载模组 "${name}" 吗？`)) return;
                btn.disabled = true;
                btn.textContent = '卸载中...';
                try {
                    const res = await fetch('/api/uninstall', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        alert(`✅ ${name} 卸载成功！`);
                        await loadMods(currentBrowseSource);
                        await loadInstalled(currentManageSource);
                    } else {
                        alert(`❌ 卸载失败: ${data.error}`);
                        btn.disabled = false;
                        btn.textContent = '卸载';
                    }
                } catch (err) {
                    alert('网络错误');
                    btn.disabled = false;
                    btn.textContent = '卸载';
                }
            };
            btn.addEventListener('click', handler);
            btn._clickHandler = handler;
        });
        
        document.querySelectorAll('.update-manage').forEach(btn => {
            btn.removeEventListener('click', btn._clickHandler);
            const handler = async (e) => {
                const name = btn.dataset.name;
                if (!confirm(`确定要更新模组 "${name}" 吗？`)) return;
                btn.disabled = true;
                btn.textContent = '更新中...';
                try {
                    const res = await fetch('/api/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        alert(`✅ ${name} 更新成功！`);
                        await loadMods(currentBrowseSource);
                        await loadInstalled(currentManageSource);
                    } else {
                        alert(`❌ 更新失败: ${data.error}`);
                        btn.disabled = false;
                        btn.textContent = '更新';
                    }
                } catch (err) {
                    alert('网络错误');
                    btn.disabled = false;
                    btn.textContent = '更新';
                }
            };
            btn.addEventListener('click', handler);
            btn._clickHandler = handler;
        });
    }

    // ==================== 模态框 ====================
    const modal = document.getElementById('mod-modal');
    const closeBtn = document.querySelector('.close');
    let currentModalMod = null;

    function showModal(mod) {
        currentModalMod = mod;
        document.getElementById('modal-picture').src = mod.PictureLink || 'https://via.placeholder.com/400x200?text=No+Image';
        document.getElementById('modal-title').textContent = mod.Name;
        document.getElementById('modal-author').textContent = mod.Author || '未知';
        document.getElementById('modal-version').textContent = mod.Version || '?';
        document.getElementById('modal-category').textContent = mod.Category || '未分类';
        document.getElementById('modal-date').textContent = mod.Date || '未知';
        document.getElementById('modal-dependency').textContent = mod.Dependency || '无';
        document.getElementById('modal-description').innerHTML = (mod.Description || '暂无描述').replace(/\n/g, '<br>');
        const installBtn = document.getElementById('modal-install-btn');
        const uninstallBtn = document.getElementById('modal-uninstall-btn');
        if (mod.is_installed) {
            installBtn.style.display = 'none';
            uninstallBtn.style.display = 'inline-block';
            uninstallBtn.dataset.name = mod.Name;
        } else {
            installBtn.style.display = 'inline-block';
            uninstallBtn.style.display = 'none';
            installBtn.dataset.filename = mod.FileName;
        }
        modal.style.display = 'block';
    }

    closeBtn.onclick = () => modal.style.display = 'none';
    window.onclick = (event) => {
        if (event.target === modal) modal.style.display = 'none';
    };

    // 模态框安装按钮（只保留一份）
    document.getElementById('modal-install-btn').addEventListener('click', async () => {
        if (!currentModalMod) return;
        const filename = currentModalMod.FileName;
        const btn = document.getElementById('modal-install-btn');
        btn.disabled = true;
        btn.textContent = '安装中...';
        try {
            const res = await fetch('/api/install', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename })
            });
            const data = await res.json();
            if (res.ok) {
                alert('安装成功！');
                modal.style.display = 'none';
                await loadMods(currentBrowseSource);
                await loadInstalled(currentManageSource);
            } else {
                alert(`安装失败: ${data.error}`);
                btn.disabled = false;
                btn.textContent = '安装';
            }
        } catch (err) {
            alert('网络错误');
            btn.disabled = false;
            btn.textContent = '安装';
        }
    });

    // 模态框卸载按钮（只保留一份）
    document.getElementById('modal-uninstall-btn').addEventListener('click', async () => {
        if (!currentModalMod) return;
        const name = currentModalMod.Name;
        if (!confirm(`确定要卸载模组 "${name}" 吗？`)) return;
        const btn = document.getElementById('modal-uninstall-btn');
        btn.disabled = true;
        btn.textContent = '卸载中...';
        try {
            const res = await fetch('/api/uninstall', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (res.ok) {
                alert('卸载成功！');
                modal.style.display = 'none';
                await loadMods(currentBrowseSource);
                await loadInstalled(currentManageSource);
            } else {
                alert(`卸载失败: ${data.error}`);
                btn.disabled = false;
                btn.textContent = '卸载';
            }
        } catch (err) {
            alert('网络错误');
            btn.disabled = false;
            btn.textContent = '卸载';
        }
    });

    // ==================== 视图切换 ====================
    document.getElementById('grid-view-btn').onclick = () => {
        currentView = 'grid';
        document.getElementById('mod-list').classList.remove('mod-list');
        document.getElementById('mod-list').classList.add('mod-grid');
        document.getElementById('grid-view-btn').classList.add('active');
        document.getElementById('list-view-btn').classList.remove('active');
        filterMods();
    };
    document.getElementById('list-view-btn').onclick = () => {
        currentView = 'list';
        document.getElementById('mod-list').classList.remove('mod-grid');
        document.getElementById('mod-list').classList.add('mod-list');
        document.getElementById('list-view-btn').classList.add('active');
        document.getElementById('grid-view-btn').classList.remove('active');
        filterMods();
    };

    // ==================== 标签页切换 ====================
    const tabBtns = document.querySelectorAll('.tab-button');
    const tabs = {
        browse: document.getElementById('browse-tab'),
        modpacks: document.getElementById('modpacks-tab'),
        manage: document.getElementById('manage-tab')
    };
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const target = btn.dataset.tab;
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            Object.values(tabs).forEach(tab => tab.classList.remove('active'));
            tabs[target].classList.add('active');
            if (target === 'manage') loadInstalled(currentManageSource);
            if (target === 'modpacks') loadModpacks(currentModpackSource);
        });
    });

    // ==================== 源切换事件（只保留一份，放在这里） ====================
    document.getElementById('source-select').addEventListener('change', async (e) => {
        const source = parseInt(e.target.value);
        currentBrowseSource = source;
        localStorage.setItem('selected_browse_source', source);
        await loadMods(source);
        // 可选：切换浏览源时是否同步已安装页面
        // await loadInstalled(source);
    });

    document.getElementById('modpack-source-select').addEventListener('change', async (e) => {
        const source = parseInt(e.target.value);
        currentModpackSource = source;
        localStorage.setItem('selected_modpack_source', source);
        await loadModpacks(source);
    });

    document.getElementById('manage-source-select').addEventListener('change', async (e) => {
        const source = parseInt(e.target.value);
        currentManageSource = source;
        localStorage.setItem('selected_manage_source', source);
        await loadInstalled(source);
    });

    // ==================== 工具函数 ====================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function (m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 监听筛选
    document.getElementById('search').addEventListener('input', filterMods);
    document.getElementById('category').addEventListener('change', filterMods);

    // 启动轮询
    startTaskPolling();

    // 初始加载
    loadSources().then(() => {
        // 从 localStorage 恢复各页面源
        const savedBrowse = localStorage.getItem('selected_browse_source');
        currentBrowseSource = savedBrowse ? parseInt(savedBrowse) : 0;
        
        const savedPack = localStorage.getItem('selected_modpack_source');
        currentModpackSource = savedPack ? parseInt(savedPack) : 0;
        
        const savedManage = localStorage.getItem('selected_manage_source');
        currentManageSource = savedManage ? parseInt(savedManage) : currentBrowseSource;
        
        // 同步下拉框值
        const browseSelect = document.getElementById('source-select');
        if (browseSelect) browseSelect.value = currentBrowseSource;
        const modpackSelect = document.getElementById('modpack-source-select');
        if (modpackSelect) modpackSelect.value = currentModpackSource;
        const manageSelect = document.getElementById('manage-source-select');
        if (manageSelect) manageSelect.value = currentManageSource;
        
        // 加载数据
        loadMods(currentBrowseSource);
        loadModpacks(currentModpackSource);
        loadInstalled(currentManageSource);
    });
</script>
</body>
</html>
