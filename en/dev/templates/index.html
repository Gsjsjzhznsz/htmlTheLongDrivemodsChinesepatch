<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Long Drive Mod Installer</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='tld.ico') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='tld.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🚗 The Long Drive Mod Installer</h1>
        <div class="tabs">
            <button class="tab-button active" data-tab="browse">📦 Browse Mods</button>
            <button class="tab-button" data-tab="modpacks">📚 Modpacks</button>
            <button class="tab-button" data-tab="manage">🔧 Installed Mods</button>
        </div>

        <!-- Browse Mods Tab -->
        <div id="browse-tab" class="tab-content active">
            <div class="top-bar">
                <div class="source-selector">
                    <label>📡 Source:</label>
                    <select id="source-select">
                        <option value="0">Loading...</option>
                    </select>
                </div>
                <div class="view-toggle">
                    <button id="grid-view-btn" class="view-btn active">🖼️ Grid View</button>
                    <button id="list-view-btn" class="view-btn">📄 List View</button>
                </div>
            </div>
            <div class="filters">
                <input type="text" id="search" placeholder="Search mod name or author..." class="search-input">
                <select id="category" class="category-select">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div id="mod-list" class="mod-grid">
                <div class="loading">Loading mod list...</div>
            </div>
        </div>

        <!-- Modpacks Tab -->
        <div id="modpacks-tab" class="tab-content">
            <div class="top-bar" style="justify-content: flex-end;">
                <div class="source-selector">
                    <label>📡 Source:</label>
                    <select id="modpack-source-select">
                        <option value="0">Loading...</option>
                    </select>
                </div>
            </div>
            <div id="modpack-list" class="mod-grid">
                <div class="loading">Loading modpacks...</div>
            </div>
        </div>

        <!-- Installed Mods Tab -->
        <div id="manage-tab" class="tab-content">
            <div class="top-bar" style="justify-content: flex-end;">
                <div class="source-selector">
                    <label>📡 Source:</label>
                    <select id="manage-source-select">
                        <option value="0">Loading...</option>
                    </select>
                </div>
            </div>
            <div id="installed-list" class="mod-grid">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Download Manager -->
    <div id="download-manager" class="download-manager collapsed">
        <div class="download-header" id="download-toggle">
            <span>📥 Download Tasks</span>
            <span id="global-speed"></span>
            <span id="global-progress"></span>
        </div>
        <div id="task-list" class="task-list"></div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modpack Result Modal -->
    <div id="modpack-result-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-result">&times;</span>
            <h3>📦 Modpack Installation Results</h3>
            <div id="modpack-result-list" style="max-height: 400px; overflow-y: auto; margin-top: 12px;"></div>
            <div style="text-align: right; margin-top: 16px;">
                <button id="close-result-btn" class="install">Close</button>
            </div>
        </div>
    </div>

    <!-- QQ Group Floating -->
    <div id="qq-group" class="qq-group">
        <div class="qq-icon">🐧</div>
        <div class="qq-popup">
            <p>🚗 The Long Drive Community</p>
            <p>📢 Group ID: <strong>661726941</strong></p>
            <a href="https://qm.qq.com/q/jZyUk3D3rO" target="_blank">🔗 Click to Join</a>
        </div>
    </div>

    <!-- Mod Detail Modal -->
    <div id="mod-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-image">
                <img id="modal-picture" src="" alt="Mod Image">
            </div>
            <h2 id="modal-title"></h2>
            <p><strong>Author:</strong> <span id="modal-author"></span></p>
            <p><strong>Version:</strong> <span id="modal-version"></span> | <strong>Category:</strong> <span id="modal-category"></span></p>
            <p><strong>Release Date:</strong> <span id="modal-date"></span></p>
            <p><strong>Dependency:</strong> <span id="modal-dependency"></span></p>
            <p><strong>Description:</strong></p>
            <div id="modal-description" class="modal-description"></div>
            <div class="modal-actions">
                <button id="modal-install-btn" class="install">Install</button>
                <button id="modal-uninstall-btn" class="uninstall" style="display:none;">Uninstall</button>
            </div>
        </div>
    </div>

<script>
    let allMods = [];
    let allModpacks = [];
    let categories = new Set();
    let currentCategory = '';
    let currentSearch = '';
    let currentView = 'grid';
    let taskInterval = null;

    let currentBrowseSource = 0;
    let currentModpackSource = 0;
    let currentManageSource = 0;

    function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function startTaskPolling() {
        if (taskInterval) clearInterval(taskInterval);
        taskInterval = setInterval(async () => {
            try {
                const res = await fetch('/api/tasks');
                const tasks = await res.json();
                updateTaskList(tasks);
                updateGlobalProgress(tasks);
            } catch (e) {
                console.error('Failed to get tasks', e);
            }
        }, 500);
    }

    function formatSpeed(bytesPerSec) {
        if (bytesPerSec < 1024) return `${bytesPerSec.toFixed(0)} B/s`;
        if (bytesPerSec < 1024 * 1024) return `${(bytesPerSec / 1024).toFixed(1)} KB/s`;
        return `${(bytesPerSec / (1024 * 1024)).toFixed(1)} MB/s`;
    }

    function formatRemaining(remainingBytes, speed) {
        if (speed <= 0) return '--';
        const seconds = remainingBytes / speed;
        if (seconds < 60) return `${Math.ceil(seconds)}s`;
        if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${Math.ceil(seconds % 60)}s`;
        return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
    }

    function updateTaskList(tasks) {
        const container = document.getElementById('task-list');
        if (!tasks.length) {
            container.innerHTML = '<div style="padding:8px;text-align:center;">No tasks</div>';
            return;
        }
        container.innerHTML = tasks.map(task => {
            let statusText = '';
            if (task.status === 'pending') statusText = '⏳ Waiting';
            else if (task.status === 'downloading') {
                const remaining = task.total_size - task.downloaded;
                const eta = formatRemaining(remaining, task.speed);
                statusText = `⬇️ ${task.progress.toFixed(0)}% (${eta})`;
            }
            else if (task.status === 'completed') statusText = '✅ Complete';
            else if (task.status === 'failed') statusText = '❌ Failed';
            return `
                <div class="task-item">
                    <div class="task-name">${escapeHtml(task.name)}</div>
                    <div class="task-progress-bar" style="width: ${task.progress}%"></div>
                    <div class="task-stats">
                        <span>${statusText}</span>
                        <span>${formatSpeed(task.speed)}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateGlobalProgress(tasks) {
        const activeTasks = tasks.filter(t => t.status === 'downloading');
        if (activeTasks.length === 0) {
            document.getElementById('global-speed').textContent = '';
            document.getElementById('global-progress').textContent = '';
            return;
        }
        const totalSpeed = activeTasks.reduce((sum, t) => sum + t.speed, 0);
        const avgProgress = activeTasks.reduce((sum, t) => sum + t.progress, 0) / activeTasks.length;
        document.getElementById('global-speed').textContent = `⚡ ${formatSpeed(totalSpeed)}`;
        document.getElementById('global-progress').textContent = `${avgProgress.toFixed(0)}%`;
    }

    document.getElementById('download-toggle').onclick = () => {
        const manager = document.getElementById('download-manager');
        manager.classList.toggle('collapsed');
    };

    async function loadSources() {
        try {
            const res = await fetch('/api/sources');
            const sources = await res.json();
            
            const browseSelect = document.getElementById('source-select');
            if (browseSelect) {
                browseSelect.innerHTML = sources.map(s => `<option value="${s.index}">${escapeHtml(s.name)}</option>`).join('');
                const saved = localStorage.getItem('selected_browse_source');
                currentBrowseSource = saved !== null ? parseInt(saved) : 0;
                browseSelect.value = currentBrowseSource;
            }
            
            const modpackSelect = document.getElementById('modpack-source-select');
            if (modpackSelect) {
                modpackSelect.innerHTML = sources.map(s => `<option value="${s.index}">${escapeHtml(s.name)}</option>`).join('');
                const savedPack = localStorage.getItem('selected_modpack_source');
                currentModpackSource = savedPack !== null ? parseInt(savedPack) : 0;
                modpackSelect.value = currentModpackSource;
            }
            
            const manageSelect = document.getElementById('manage-source-select');
            if (manageSelect) {
                manageSelect.innerHTML = sources.map(s => `<option value="${s.index}">${escapeHtml(s.name)}</option>`).join('');
                const savedManage = localStorage.getItem('selected_manage_source');
                if (savedManage !== null) {
                    currentManageSource = parseInt(savedManage);
                    manageSelect.value = currentManageSource;
                } else {
                    currentManageSource = currentBrowseSource;
                    manageSelect.value = currentManageSource;
                    localStorage.setItem('selected_manage_source', currentManageSource);
                }
            }
        } catch (e) {
            console.error('Failed to load sources', e);
            const selects = ['source-select', 'modpack-source-select', 'manage-source-select'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = '<option value="0">Failed to load</option>';
            });
        }
    }

    async function loadMods(source) {
        const container = document.getElementById('mod-list');
        container.innerHTML = '<div class="loading">Loading mod list...</div>';
        try {
            const res = await fetch(`/api/mods?source=${source}`);
            const data = await res.json();
            allMods = data.mods;
            if (data.active_source !== undefined) {
                currentBrowseSource = data.active_source;
                const select = document.getElementById('source-select');
                if (select && select.value != data.active_source) select.value = data.active_source;
            }
            updateCategories();
            filterMods();
        } catch (err) {
            container.innerHTML = '<div class="error">Failed to load. Please make sure the backend is running.</div>';
            showToast('Failed to load mod list', 'error');
        }
    }

    function updateCategories() {
        categories.clear();
        allMods.forEach(mod => {
            if (mod.Category) categories.add(mod.Category);
        });
        const catSelect = document.getElementById('category');
        catSelect.innerHTML = '<option value="">All Categories</option>';
        Array.from(categories).sort().forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            catSelect.appendChild(option);
        });
    }

    function filterMods() {
        const searchTerm = document.getElementById('search').value.toLowerCase();
        const category = document.getElementById('category').value;
        currentSearch = searchTerm;
        currentCategory = category;
        const filtered = allMods.filter(mod => {
            const matchSearch = mod.Name.toLowerCase().includes(searchTerm) ||
                                (mod.Author && mod.Author.toLowerCase().includes(searchTerm));
            const matchCat = category === '' || mod.Category === category;
            return matchSearch && matchCat;
        });
        renderMods(filtered);
    }

    function renderMods(mods) {
        const container = document.getElementById('mod-list');
        if (!mods.length) {
            container.innerHTML = '<div class="info">No mods found</div>';
            return;
        }
        container.innerHTML = mods.map(mod => `
            <div class="mod-card" data-mod='${escapeHtml(JSON.stringify(mod))}'>
                <div class="mod-image">
                    <img src="${mod.PictureLink || 'https://via.placeholder.com/200x200?text=No+Image'}" 
                         loading="lazy"
                         onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'"
                         alt="${escapeHtml(mod.Name)}">
                </div>
                <div class="mod-info">
                    <h3>${escapeHtml(mod.Name)}</h3>
                    <p class="author">Author: ${escapeHtml(mod.Author || 'Unknown')}</p>
                    <p class="version">Version: ${escapeHtml(mod.Version || '?')}</p>
                    <p class="desc">${escapeHtml(mod.Description ? mod.Description.substring(0, 100) + (mod.Description.length > 100 ? '...' : '') : 'No description')}</p>
                    <div class="mod-actions">
                        ${mod.is_installed ? 
                            `<button class="uninstall" data-name="${escapeHtml(mod.Name)}" data-filename="${escapeHtml(mod.FileName)}">Uninstall</button>` : 
                            `<button class="install" data-filename="${escapeHtml(mod.FileName)}" data-name="${escapeHtml(mod.Name)}">Install</button>`
                        }
                    </div>
                </div>
            </div>
        `).join('');

        bindCardEvents();
        bindButtonEvents();
    }

    function bindCardEvents() {
        document.querySelectorAll('.mod-card').forEach(card => {
            card.removeEventListener('click', card._clickHandler);
            const handler = (e) => {
                if (e.target.tagName === 'BUTTON') return;
                try {
                    const mod = JSON.parse(card.dataset.mod);
                    showModal(mod);
                } catch (e) { }
            };
            card.addEventListener('click', handler);
            card._clickHandler = handler;
        });
    }

    function bindButtonEvents() {
        document.querySelectorAll('.install').forEach(btn => {
            btn.removeEventListener('click', btn._clickHandler);
            const handler = async (e) => {
                e.stopPropagation();
                const filename = btn.dataset.filename;
                const name = btn.dataset.name;
                btn.disabled = true;
                btn.textContent = 'Installing...';
                try {
                    const res = await fetch('/api/install', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast(`✅ ${name} installed successfully!`, 'success');
                        await loadMods(currentBrowseSource);
                        await loadInstalled(currentManageSource);
                    } else {
                        showToast(`❌ Installation failed: ${data.error}`, 'error');
                        btn.disabled = false;
                        btn.textContent = 'Install';
                    }
                } catch (err) {
                    showToast('Network error', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Install';
                }
            };
            btn.addEventListener('click', handler);
            btn._clickHandler = handler;
        });

        document.querySelectorAll('.uninstall').forEach(btn => {
            btn.removeEventListener('click', btn._clickHandler);
            const handler = async (e) => {
                e.stopPropagation();
                const name = btn.dataset.name;
                if (!confirm(`Are you sure you want to uninstall "${name}"?`)) return;
                btn.disabled = true;
                btn.textContent = 'Uninstalling...';
                try {
                    const res = await fetch('/api/uninstall', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast(`✅ ${name} uninstalled successfully!`, 'success');
                        await loadMods(currentBrowseSource);
                        await loadInstalled(currentManageSource);
                    } else {
                        showToast(`❌ Uninstall failed: ${data.error}`, 'error');
                        btn.disabled = false;
                        btn.textContent = 'Uninstall';
                    }
                } catch (err) {
                    showToast('Network error', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Uninstall';
                }
            };
            btn.addEventListener('click', handler);
            btn._clickHandler = handler;
        });
    }

    async function loadModpacks(source) {
        const container = document.getElementById('modpack-list');
        container.innerHTML = '<div class="loading">Loading modpacks...</div>';
        try {
            const res = await fetch(`/api/modpacks?source=${source}`);
            const data = await res.json();
            allModpacks = data.modpacks;
            if (data.active_source !== undefined) {
                currentModpackSource = data.active_source;
                const select = document.getElementById('modpack-source-select');
                if (select && select.value != data.active_source) select.value = data.active_source;
            }
            if (!allModpacks.length) {
                container.innerHTML = '<div class="info">No modpacks available</div>';
                return;
            }
            container.innerHTML = allModpacks.map(pack => `
                <div class="mod-card">
                    <div class="mod-image">
                        <img src="${pack.PictureLink || 'https://via.placeholder.com/200x200?text=No+Image'}" 
                             loading="lazy"
                             onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'"
                             alt="${escapeHtml(pack.Name)}">
                    </div>
                    <div class="mod-info">
                        <h3>${escapeHtml(pack.Name)}</h3>
                        <p class="author">Author: ${escapeHtml(pack.Author || 'Unknown')}</p>
                        <p class="version">Version: ${escapeHtml(pack.Version || '?')}</p>
                        <p class="desc">${escapeHtml(pack.Description ? pack.Description.substring(0, 100) + (pack.Description.length > 100 ? '...' : '') : 'No description')}</p>
                        <div class="mod-actions">
                            <button class="install-modpack" data-pack='${escapeHtml(JSON.stringify(pack))}'>📦 Install Modpack</button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.install-modpack').forEach(btn => {
                btn.removeEventListener('click', btn._clickHandler);
                const handler = async (e) => {
                    e.stopPropagation();
                    const pack = JSON.parse(btn.dataset.pack);
                    if (!confirm(`Install modpack "${pack.Name}"?\nThis will install all mods included in the pack.`)) return;
                    btn.disabled = true;
                    btn.textContent = 'Installing...';
                    try {
                        const res = await fetch('/api/install-modpack', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(pack)
                        });
                        const data = await res.json();
                        if (res.ok) {
                            showModpackResult(data.results);
                            await loadMods(currentBrowseSource);
                            await loadInstalled(currentManageSource);
                        } else {
                            showToast(`Installation failed: ${data.error}`, 'error');
                        }
                    } catch (err) {
                        showToast('Network error', 'error');
                    }
                    btn.disabled = false;
                    btn.textContent = '📦 Install Modpack';
                };
                btn.addEventListener('click', handler);
                btn._clickHandler = handler;
            });
        } catch (err) {
            container.innerHTML = '<div class="error">Failed to load modpacks</div>';
            showToast('Failed to load modpacks', 'error');
        }
    }

    function showModpackResult(results) {
        const modal = document.getElementById('modpack-result-modal');
        const listDiv = document.getElementById('modpack-result-list');
        listDiv.innerHTML = results.map(r => `<div style="margin-bottom: 4px;">${escapeHtml(r)}</div>`).join('');
        modal.style.display = 'block';

        const closeModal = () => {
            modal.style.display = 'none';
        };
        document.getElementById('close-result-btn').onclick = closeModal;
        document.querySelector('.close-result').onclick = closeModal;
        window.onclick = (event) => {
            if (event.target === modal) closeModal();
        };
    }

    async function loadInstalled(source = currentManageSource) {
        const container = document.getElementById('installed-list');
        container.innerHTML = '<div class="loading">Loading...</div>';
        try {
            const res = await fetch(`/api/mods?source=${source}`);
            const data = await res.json();
            
            if (data.active_source !== undefined) {
                currentManageSource = data.active_source;
                const manageSelect = document.getElementById('manage-source-select');
                if (manageSelect && manageSelect.value != data.active_source) {
                    manageSelect.value = data.active_source;
                    localStorage.setItem('selected_manage_source', data.active_source);
                }
            }
            
            const installedMods = data.mods.filter(mod => mod.is_installed);
            if (!installedMods.length) {
                container.innerHTML = '<div class="info">No installed mods</div>';
                return;
            }
            
            container.innerHTML = installedMods.map(mod => {
                const needUpdate = mod.installed_version !== mod.Version && mod.Version;
                return `
                    <div class="mod-card">
                        <div class="mod-image">
                            <img src="${mod.PictureLink || 'https://via.placeholder.com/200x200?text=No+Image'}" 
                                 loading="lazy"
                                 onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'"
                                 alt="${escapeHtml(mod.Name)}">
                        </div>
                        <div class="mod-info">
                            <h3>${escapeHtml(mod.Name)}</h3>
                            <p class="author">Author: ${escapeHtml(mod.Author || 'Unknown')}</p>
                            <p class="version">Installed: ${escapeHtml(mod.installed_version || '?')} | Latest: ${escapeHtml(mod.Version || '?')}</p>
                            <p class="desc">${escapeHtml(mod.Description ? mod.Description.substring(0, 100) + (mod.Description.length > 100 ? '...' : '') : 'No description')}</p>
                            <div class="mod-actions">
                                <button class="uninstall-manage" data-name="${escapeHtml(mod.Name)}">Uninstall</button>
                                <button class="update-manage" data-name="${escapeHtml(mod.Name)}" ${needUpdate ? '' : 'disabled'}>${needUpdate ? 'Update' : 'Up to date'}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            bindManageButtons();
        } catch (err) {
            console.error('Failed to load installed mods:', err);
            container.innerHTML = '<div class="error">Failed to load</div>';
            showToast('Failed to load installed mods', 'error');
        }
    }

    function bindManageButtons() {
        document.querySelectorAll('.uninstall-manage').forEach(btn => {
            btn.removeEventListener('click', btn._clickHandler);
            const handler = async (e) => {
                const name = btn.dataset.name;
                if (!confirm(`Are you sure you want to uninstall "${name}"?`)) return;
                btn.disabled = true;
                btn.textContent = 'Uninstalling...';
                try {
                    const res = await fetch('/api/uninstall', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast(`✅ ${name} uninstalled successfully!`, 'success');
                        await loadMods(currentBrowseSource);
                        await loadInstalled(currentManageSource);
                    } else {
                        showToast(`❌ Uninstall failed: ${data.error}`, 'error');
                        btn.disabled = false;
                        btn.textContent = 'Uninstall';
                    }
                } catch (err) {
                    showToast('Network error', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Uninstall';
                }
            };
            btn.addEventListener('click', handler);
            btn._clickHandler = handler;
        });
        
        document.querySelectorAll('.update-manage').forEach(btn => {
            btn.removeEventListener('click', btn._clickHandler);
            const handler = async (e) => {
                const name = btn.dataset.name;
                if (!confirm(`Are you sure you want to update "${name}"?`)) return;
                btn.disabled = true;
                btn.textContent = 'Updating...';
                try {
                    const res = await fetch('/api/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast(`✅ ${name} updated successfully!`, 'success');
                        await loadMods(currentBrowseSource);
                        await loadInstalled(currentManageSource);
                    } else {
                        showToast(`❌ Update failed: ${data.error}`, 'error');
                        btn.disabled = false;
                        btn.textContent = 'Update';
                    }
                } catch (err) {
                    showToast('Network error', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Update';
                }
            };
            btn.addEventListener('click', handler);
            btn._clickHandler = handler;
        });
    }

    const modal = document.getElementById('mod-modal');
    const closeBtn = document.querySelector('.close');
    let currentModalMod = null;

    function showModal(mod) {
        currentModalMod = mod;
        document.getElementById('modal-picture').src = mod.PictureLink || 'https://via.placeholder.com/400x200?text=No+Image';
        document.getElementById('modal-title').textContent = mod.Name;
        document.getElementById('modal-author').textContent = mod.Author || 'Unknown';
        document.getElementById('modal-version').textContent = mod.Version || '?';
        document.getElementById('modal-category').textContent = mod.Category || 'Uncategorized';
        document.getElementById('modal-date').textContent = mod.Date || 'Unknown';
        document.getElementById('modal-dependency').textContent = mod.Dependency || 'None';
        document.getElementById('modal-description').innerHTML = (mod.Description || 'No description').replace(/\n/g, '<br>');
        const installBtn = document.getElementById('modal-install-btn');
        const uninstallBtn = document.getElementById('modal-uninstall-btn');
        if (mod.is_installed) {
            installBtn.style.display = 'none';
            uninstallBtn.style.display = 'inline-block';
            uninstallBtn.dataset.name = mod.Name;
        } else {
            installBtn.style.display = 'inline-block';
            uninstallBtn.style.display = 'none';
            installBtn.dataset.filename = mod.FileName;
        }
        modal.style.display = 'block';
    }

    closeBtn.onclick = () => modal.style.display = 'none';
    window.onclick = (event) => {
        if (event.target === modal) modal.style.display = 'none';
    };

    document.getElementById('modal-install-btn').addEventListener('click', async () => {
        if (!currentModalMod) return;
        const filename = currentModalMod.FileName;
        const btn = document.getElementById('modal-install-btn');
        btn.disabled = true;
        btn.textContent = 'Installing...';
        try {
            const res = await fetch('/api/install', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename })
            });
            const data = await res.json();
            if (res.ok) {
                showToast('Installation successful!', 'success');
                modal.style.display = 'none';
                await loadMods(currentBrowseSource);
                await loadInstalled(currentManageSource);
            } else {
                showToast(`Installation failed: ${data.error}`, 'error');
                btn.disabled = false;
                btn.textContent = 'Install';
            }
        } catch (err) {
            showToast('Network error', 'error');
            btn.disabled = false;
            btn.textContent = 'Install';
        }
    });

    document.getElementById('modal-uninstall-btn').addEventListener('click', async () => {
        if (!currentModalMod) return;
        const name = currentModalMod.Name;
        if (!confirm(`Are you sure you want to uninstall "${name}"?`)) return;
        const btn = document.getElementById('modal-uninstall-btn');
        btn.disabled = true;
        btn.textContent = 'Uninstalling...';
        try {
            const res = await fetch('/api/uninstall', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (res.ok) {
                showToast('Uninstallation successful!', 'success');
                modal.style.display = 'none';
                await loadMods(currentBrowseSource);
                await loadInstalled(currentManageSource);
            } else {
                showToast(`Uninstallation failed: ${data.error}`, 'error');
                btn.disabled = false;
                btn.textContent = 'Uninstall';
            }
        } catch (err) {
            showToast('Network error', 'error');
            btn.disabled = false;
            btn.textContent = 'Uninstall';
        }
    });

    document.getElementById('grid-view-btn').onclick = () => {
        currentView = 'grid';
        document.getElementById('mod-list').classList.remove('mod-list');
        document.getElementById('mod-list').classList.add('mod-grid');
        document.getElementById('grid-view-btn').classList.add('active');
        document.getElementById('list-view-btn').classList.remove('active');
        filterMods();
    };
    document.getElementById('list-view-btn').onclick = () => {
        currentView = 'list';
        document.getElementById('mod-list').classList.remove('mod-grid');
        document.getElementById('mod-list').classList.add('mod-list');
        document.getElementById('list-view-btn').classList.add('active');
        document.getElementById('grid-view-btn').classList.remove('active');
        filterMods();
    };

    const tabBtns = document.querySelectorAll('.tab-button');
    const tabs = {
        browse: document.getElementById('browse-tab'),
        modpacks: document.getElementById('modpacks-tab'),
        manage: document.getElementById('manage-tab')
    };
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const target = btn.dataset.tab;
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            Object.values(tabs).forEach(tab => tab.classList.remove('active'));
            tabs[target].classList.add('active');
            if (target === 'manage') loadInstalled(currentManageSource);
            if (target === 'modpacks') loadModpacks(currentModpackSource);
        });
    });

    document.getElementById('source-select').addEventListener('change', async (e) => {
        const source = parseInt(e.target.value);
        currentBrowseSource = source;
        localStorage.setItem('selected_browse_source', source);
        await loadMods(source);
    });

    document.getElementById('modpack-source-select').addEventListener('change', async (e) => {
        const source = parseInt(e.target.value);
        currentModpackSource = source;
        localStorage.setItem('selected_modpack_source', source);
        await loadModpacks(source);
    });

    document.getElementById('manage-source-select').addEventListener('change', async (e) => {
        const source = parseInt(e.target.value);
        currentManageSource = source;
        localStorage.setItem('selected_manage_source', source);
        await loadInstalled(source);
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function (m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('search').addEventListener('input', filterMods);
    document.getElementById('category').addEventListener('change', filterMods);

    startTaskPolling();

    loadSources().then(() => {
        const savedBrowse = localStorage.getItem('selected_browse_source');
        currentBrowseSource = savedBrowse ? parseInt(savedBrowse) : 0;
        
        const savedPack = localStorage.getItem('selected_modpack_source');
        currentModpackSource = savedPack ? parseInt(savedPack) : 0;
        
        const savedManage = localStorage.getItem('selected_manage_source');
        currentManageSource = savedManage ? parseInt(savedManage) : currentBrowseSource;
        
        const browseSelect = document.getElementById('source-select');
        if (browseSelect) browseSelect.value = currentBrowseSource;
        const modpackSelect = document.getElementById('modpack-source-select');
        if (modpackSelect) modpackSelect.value = currentModpackSource;
        const manageSelect = document.getElementById('manage-source-select');
        if (manageSelect) manageSelect.value = currentManageSource;
        
        loadMods(currentBrowseSource);
        loadModpacks(currentModpackSource);
        loadInstalled(currentManageSource);
    });
</script>
</body>
</html>
